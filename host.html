<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPlay | Host Lobby</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #6c5ce7;
            --danger: #ff7675;
            --success: #00b894;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #2d3436;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 4px solid white;
            position: relative;
        }

        h1 { font-weight: 800; font-size: 2rem; margin-top: 0; letter-spacing: -1px; }

        #codeContainer {
            background: #f1f2f6;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
            cursor: pointer;
            transition: 0.2s;
        }
        #codeContainer:hover { transform: scale(1.02); background: #e8e9ed; }
        
        #code {
            font-size: 64px;
            font-weight: 800;
            display: block;
            color: var(--primary);
            letter-spacing: 8px;
        }

        .copy-hint { font-size: 11px; color: #b2bec3; font-weight: 800; text-transform: uppercase; }

        .player-area {
            background: white;
            border-radius: 24px;
            border: 2px solid #f1f2f6;
            margin: 25px 0;
            padding: 20px;
            max-height: 280px;
            overflow-y: auto;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mini-avatar {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800;
        }

        .player-name { flex: 1; text-align: left; font-weight: 700; color: #2d3436; font-size: 14px; }

        button {
            padding: 18px; border: none; border-radius: 20px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            width: 100%; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: 0.2s;
        }

        .create-btn { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(108,92,231,0.2); }
        .start-btn { background: var(--success); color: white; margin-top: 10px; box-shadow: 0 10px 20px rgba(0,184,148,0.2); }
        .kick-btn { width: auto; padding: 6px; background: none; color: var(--danger); }
        
        button:active { transform: scale(0.96); }
        button:disabled { background: #dfe6e9; color: #b2bec3; cursor: not-allowed; }

        .hidden { display: none !important; }
        
        .status-pill {
            display: inline-block; padding: 6px 12px; background: #f1f2f6;
            border-radius: 20px; font-size: 11px; font-weight: 800;
            color: #b2bec3; margin-top: 20px;
        }

        .spin { animation: rotate 1s linear infinite; display: inline-block; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1><i data-lucide="crown" style="color:#fdcb6e"></i> Host Lobby</h1>
    
    <button class="create-btn" id="createBtn" onclick="createParty()">
        <i data-lucide="plus-circle"></i> Create New Party
    </button>
    
    <div id="lobbyArea" class="hidden">
        <div id="codeContainer" onclick="copyCode()">
            <span class="copy-hint">Click to Copy Code</span>
            <div id="code">----</div>
        </div>

        <div class="player-area">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <span style="font-weight:800; color:#b2bec3; font-size:11px;">PLAYERS JOINED</span>
                <span id="playerCount" style="background:var(--primary); color:white; padding:1px 8px; border-radius:6px; font-size:11px;">0</span>
            </div>
            <ul id="players"></ul>
            <p id="msg" style="color: #b2bec3; font-size: 13px; margin: 15px 0;">Waiting for squad...</p>
        </div>

        <button id="startBtn" class="start-btn hidden" onclick="startGame()">
            <i data-lucide="rocket"></i> START GAME
        </button>
    </div>

    <div class="status-pill" id="statusMsg">Connecting to Server...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, onDisconnect, serverTimestamp, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let partyCode;
    let currentUser;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("statusMsg").innerText = "Logged in as Host";
            const urlParams = new URLSearchParams(window.location.search);
            const existingCode = urlParams.get('code');
            if (existingCode) rejoinLobby(existingCode);
        } else {
            document.getElementById("statusMsg").innerText = "Authentication Required";
        }
    });

    async function rejoinLobby(code) {
        partyCode = code;
        const snapshot = await get(ref(db, `parties/${partyCode}`));
        if(snapshot.exists()) {
            setupUI();
            // Single update to reset lobby state without touching players
            await update(ref(db, `parties/${partyCode}/gameData`), { 
                status: "lobby", 
                syllable: "LOBBY",
                redirect: false 
            });
            setupHostPresence();
            listenPlayers();
        } else {
            document.getElementById("statusMsg").innerText = "Session Not Found";
            window.history.pushState({}, '', window.location.pathname);
        }
    }

    window.createParty = async function() {
        if (!currentUser) return;
        partyCode = Math.floor(1000 + Math.random() * 9000).toString();
        
        // Update URL
        const newurl = window.location.origin + window.location.pathname + '?code=' + partyCode;
        window.history.pushState({path:newurl},'',newurl);

        setupUI();
        
        // COMBINED UPDATE: Create everything in one go.
        // This prevents race conditions where players join before gameData exists.
        const initialData = {
            created: serverTimestamp(),
            hostId: currentUser.uid,
            hostActive: true,
            gameData: {
                status: "lobby",
                syllable: "LOBBY",
                redirect: false
            }
        };

        await update(ref(db, "parties/" + partyCode), initialData);

        setupHostPresence();
        listenPlayers();
    }

    function setupUI() {
        document.getElementById("code").innerText = partyCode;
        document.getElementById("createBtn").classList.add("hidden");
        document.getElementById("lobbyArea").classList.remove("hidden");
    }

    function setupHostPresence() {
        const hostRef = ref(db, `parties/${partyCode}/hostActive`);
        onDisconnect(hostRef).set(false);
        set(hostRef, true);
    }

    function listenPlayers() {
        onValue(ref(db, `parties/${partyCode}/players`), (snapshot) => {
            const list = document.getElementById("players");
            const startBtn = document.getElementById("startBtn");
            const msg = document.getElementById("msg");
            const countLabel = document.getElementById("playerCount");
            
            list.innerHTML = "";
            let count = 0;

            if (snapshot.exists()) {
                const players = snapshot.val();
                Object.keys(players).forEach(uid => {
                    count++;
                    const p = players[uid];
                    const char = p.name ? p.name.charAt(0).toUpperCase() : "?";
                    
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <div class="mini-avatar" style="background:${p.color || '#6c5ce7'}">${char}</div>
                        <span class="player-name">${p.name}</span>
                        <button class="kick-btn" title="Kick Player" onclick="kickPlayer('${uid}')"><i data-lucide="x-circle"></i></button>
                    `;
                    list.appendChild(li);
                });
            }

            countLabel.innerText = count;
            lucide.createIcons();

            // Only show Start button if there are players
            if (count >= 1) { 
                startBtn.classList.remove("hidden");
                msg.classList.add("hidden");
            } else {
                startBtn.classList.add("hidden");
                msg.classList.remove("hidden");
            }
        });
    }

    window.copyCode = () => {
        navigator.clipboard.writeText(partyCode);
        const codeEl = document.getElementById("code");
        const originalCode = codeEl.innerText;
        codeEl.innerText = "COPIED!";
        setTimeout(() => codeEl.innerText = originalCode, 1000);
    };

    window.kickPlayer = (uid) => {
        if(confirm("Kick this player?")) {
            remove(ref(db, `parties/${partyCode}/players/${uid}`));
        }
    };

    window.startGame = async function() {
        const startBtn = document.getElementById("startBtn");
        startBtn.disabled = true;
        startBtn.innerHTML = `<i data-lucide="loader" class="spin"></i> INITIALIZING...`;
        lucide.createIcons();

        // 1. Final check for players
        const pSnap = await get(ref(db, `parties/${partyCode}/players`));
        if (!pSnap.exists()) {
            alert("Waiting for players to join...");
            startBtn.disabled = false;
            startBtn.innerHTML = `<i data-lucide="rocket"></i> START GAME`;
            return;
        }

        // 2. Clear old game state (NOT player list) to ensure a fresh start
        await remove(ref(db, `parties/${partyCode}/playersData`));

        // 3. Set status to playing. This triggers the player's game.js to react.
        await update(ref(db, `parties/${partyCode}/gameData`), { 
            status: "playing",
            redirect: false 
        });

        // 4. Smooth transition to the Game screen
        setTimeout(() => {
            window.location.href = `Games/Word Bomb/game.html?code=${partyCode}`;
        }, 500);
    }

    lucide.createIcons();
</script>
</body>
</html>
