<!DOCTYPE html>
<html>
<head>
<title>Host Party</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff9966,#ff5e62);
color:white;
text-align:center;
margin:0;
}

.container{
margin-top:100px;
}

#code{
font-size:60px;
margin:20px;
font-weight:bold;
}

.playerBox{
background:white;
color:black;
width:350px;
margin:auto;
padding:20px;
border-radius:10px;
}

li{
display:flex;
justify-content:space-between;
padding:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Host Party</h1>

<button onclick="createParty()">Create Party</button>

<div id="code">----</div>

<div class="playerBox">

<h3>Players Joined</h3>

<ul id="players"></ul>
<p id="msg" style="color:red;">Waiting for at least 2 players...</p>
<button id="startBtn" onclick="startGame()" style="display:none; background:#2ecc71; color:white;">🚀 START GAME</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
authDomain: "syncplay-17b6e.firebaseapp.com",
databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
projectId: "syncplay-17b6e",
storageBucket: "syncplay-17b6e.firebasestorage.app",
messagingSenderId: "86016195929",
appId: "1:86016195929:web:40262a28786f2ead712048"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let partyCode;

function createParty(){

partyCode=Math.floor(1000+Math.random()*9000);

document.getElementById("code").innerText=partyCode;

set(ref(db,"parties/"+partyCode),{
created:Date.now()
});

listenPlayers();

}

function listenPlayers(){
    onValue(ref(db,"parties/"+partyCode+"/players"),(snapshot)=>{
        let list=document.getElementById("players");
        list.innerHTML="";
        let count = 0;
        snapshot.forEach(player=>{
            count++;
            let data=player.val();
            let uid=player.key;
            let li=document.createElement("li");
            li.innerHTML=data.name + ` <button onclick="kickPlayer('${uid}')">Kick</button>`;
            list.appendChild(li);
        });

        if(count >= 2) {
            document.getElementById("startBtn").style.display = "inline-block";
            document.getElementById("msg").style.display = "none";
        } else {
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("msg").style.display = "block";
        }
    });
}
function kickPlayer(uid){

remove(ref(db,"parties/"+partyCode+"/players/"+uid));

}
function startGame() {
    set(ref(db, "parties/" + partyCode + "/gameState"), { status: "playing" });
    window.location.href = `Games/Word Bomb/game.html?code=${partyCode}`;
}
window.startGame = startGame;
window.createParty=createParty;
window.kickPlayer=kickPlayer;

</script>

</body>
</html>
