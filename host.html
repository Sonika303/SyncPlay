<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPlay | Host Lobby</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #6c5ce7;
            --danger: #ff7675;
            --success: #00b894;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #2d3436;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 4px solid white;
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }

        h1 { font-weight: 800; font-size: 1.8rem; margin: 0; letter-spacing: -1px; }

        .game-slider-container {
            margin: 25px 0;
            position: relative;
            padding: 10px 0;
        }

        .game-slider {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 10px 5px;
            scrollbar-width: none;
        }

        .game-slider::-webkit-scrollbar { display: none; }

        .game-card {
            flex: 0 0 75%;
            scroll-snap-align: center;
            background: white;
            padding: 20px;
            border-radius: 28px;
            border: 3px solid #f1f2f6;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
        }

        .game-card.active {
            border-color: var(--primary);
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.2);
        }

        .game-card .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .game-card h3 { margin: 0; font-size: 18px; font-weight: 800; }
        .game-card p { margin: 5px 0 0; font-size: 12px; color: #636e72; line-height: 1.4; }

        .active-tag {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            display: none;
        }
        .game-card.active .active-tag { display: block; }

        #codeContainer {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 24px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        
        #code {
            font-size: 52px;
            font-weight: 800;
            display: block;
            color: var(--primary);
            letter-spacing: 6px;
        }

        .player-area {
            background: white;
            border-radius: 24px;
            border: 2px solid #f1f2f6;
            margin: 20px 0;
            padding: 20px;
            max-height: 180px;
            overflow-y: auto;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 8px;
        }

        .mini-avatar {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 800; font-size: 12px;
        }

        .player-name { flex: 1; text-align: left; font-weight: 700; color: #2d3436; font-size: 14px; }

        button {
            padding: 18px; border: none; border-radius: 20px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            width: 100%; display: flex; align-items: center;
            justify-content: center; gap: 10px; transition: 0.2s;
        }

        .create-btn { background: var(--primary); color: white; }
        .start-btn { background: var(--success); color: white; margin-top: 10px; }
        .kick-btn { width: auto; padding: 5px; background: none; color: var(--danger); border: none; }
        
        .hidden { display: none !important; }
        
        .status-pill {
            display: inline-block; padding: 6px 12px; background: #f1f2f6;
            border-radius: 20px; font-size: 11px; font-weight: 800;
            color: #b2bec3; margin-top: 15px;
        }

        .spin { animation: rotate 1s linear infinite; display: inline-block; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1><i data-lucide="crown" style="color:#fdcb6e"></i> Host Lobby</h1>
    
    <button class="create-btn" id="createBtn" onclick="createParty()">
        <i data-lucide="plus-circle"></i> Create New Party
    </button>
    
    <div id="lobbyArea" class="hidden">
        <div id="codeContainer" onclick="copyCode()">
            <span style="font-size: 10px; font-weight: 800; color: #b2bec3; text-transform: uppercase;">Lobby Code</span>
            <div id="code">----</div>
        </div>

        <div class="game-slider-container">
            <div style="text-align: left; font-size: 11px; font-weight: 800; color: #b2bec3; margin-bottom: 10px;">CHOOSE GAME</div>
            <div class="game-slider" id="gameSlider">
                
                <div class="game-card active" onclick="selectGame('SNAKE!', this)">
                    <div class="active-tag">SELECTED</div>
                    <div class="icon-box" style="background:#00b894"><i data-lucide="box"></i></div>
                    <h3>SNAKE!</h3>
                    <p>Classic multiplayer arena.</p>
                </div>

                <div class="game-card" onclick="selectGame('Word Bomb', this)">
                    <div class="active-tag">SELECTED</div>
                    <div class="icon-box" style="background:var(--primary)"><i data-lucide="bomb"></i></div>
                    <h3>Word Bomb</h3>
                    <p>Type fast or explode!</p>
                </div>

            </div>
        </div>

        <div class="player-area">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <span style="font-weight:800; color:#b2bec3; font-size:11px;">PLAYERS</span>
                <span id="playerCount" style="background:var(--primary); color:white; padding:1px 8px; border-radius:6px; font-size:11px;">0</span>
            </div>
            <ul id="players"></ul>
            <p id="msg" style="color: #b2bec3; font-size: 13px; margin: 15px 0;">Waiting for squad...</p>
        </div>

        <button id="startBtn" class="start-btn hidden" onclick="startGame()">
            <i data-lucide="rocket"></i> START GAME
        </button>
    </div>

    <div class="status-pill" id="statusMsg">Connecting...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, serverTimestamp, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let partyCode;
    let currentUser;
    let selectedGame = "SNAKE!";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("statusMsg").innerText = "Host Ready";
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if(code) rejoinLobby(code);
        }
    });

    window.selectGame = (game, el) => {
        selectedGame = game;
        document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    };

    window.createParty = async function() {
        if (!currentUser) return;
        partyCode = Math.floor(1000 + Math.random() * 9000).toString();
        const newurl = window.location.origin + window.location.pathname + '?code=' + partyCode;
        window.history.pushState({path:newurl},'',newurl);

        setupUI();
        await set(ref(db, "parties/" + partyCode), {
            created: serverTimestamp(),
            hostId: currentUser.uid,
            hostActive: true,
            gameData: { status: "lobby", redirect: "" }
        });
        listenPlayers();
    };

    async function rejoinLobby(code) {
        partyCode = code;
        const snapshot = await get(ref(db, `parties/${partyCode}`));
        if(snapshot.exists()) {
            setupUI();
            listenPlayers();
        }
    }

    function setupUI() {
        document.getElementById("code").innerText = partyCode;
        document.getElementById("createBtn").classList.add("hidden");
        document.getElementById("lobbyArea").classList.remove("hidden");
        lucide.createIcons();
    }

    function listenPlayers() {
        onValue(ref(db, `parties/${partyCode}/players`), (snapshot) => {
            const list = document.getElementById("players");
            const startBtn = document.getElementById("startBtn");
            const countLabel = document.getElementById("playerCount");
            list.innerHTML = "";
            let count = 0;
            if (snapshot.exists()) {
                const players = snapshot.val();
                Object.keys(players).forEach(uid => {
                    count++;
                    const p = players[uid];
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <div class="mini-avatar" style="background:${p.color || '#6c5ce7'}">${p.name[0].toUpperCase()}</div>
                        <span class="player-name">${p.name}</span>
                        <button class="kick-btn" onclick="window.kickPlayer('${uid}')"><i data-lucide="x-circle"></i></button>`;
                    list.appendChild(li);
                });
            }
            countLabel.innerText = count;
            if (count >= 1) {
                startBtn.classList.remove("hidden");
                document.getElementById("msg").classList.add("hidden");
            } else {
                startBtn.classList.add("hidden");
                document.getElementById("msg").classList.remove("hidden");
            }
            lucide.createIcons();
        });
    }

    window.startGame = async function() {
        const startBtn = document.getElementById("startBtn");
        startBtn.disabled = true;
        startBtn.innerHTML = `<i data-lucide="loader" class="spin"></i> LAUNCHING...`;
        lucide.createIcons();

        // Make sure the controllerPath EXACTLY matches your folder name
        // If your folder is "SNAKE!", keep it like this.
        const controllerPath = `Games/${selectedGame}/controller.html`;
        
        console.log("Redirecting players to:", controllerPath);

        await update(ref(db, `parties/${partyCode}/gameData`), { 
            status: "playing",
            currentGame: selectedGame,
            redirect: controllerPath 
        });

        // Delay host transition to allow Firebase to update first
        setTimeout(() => {
            window.location.href = `Games/${selectedGame}/game.html?code=${partyCode}`;
        }, 1200);
    }

    window.copyCode = () => {
        navigator.clipboard.writeText(partyCode);
        const codeEl = document.getElementById("code");
        const oldVal = codeEl.innerText;
        codeEl.innerText = "COPIED";
        setTimeout(() => codeEl.innerText = oldVal, 1000);
    };

    window.kickPlayer = (uid) => {
        if(confirm("Kick player?")) remove(ref(db, `parties/${partyCode}/players/${uid}`));
    };

    lucide.createIcons();
</script>
</body>
</html>
