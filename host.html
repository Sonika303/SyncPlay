<!DOCTYPE html>
<html>
<head>
    <title>Host Party</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: white;
            text-align: center;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #code {
            font-size: 80px;
            margin: 20px;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .playerBox {
            background: white;
            color: black;
            width: 350px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        ul { list-style: none; padding: 0; }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        .kick-btn { background: #ff4757; color: white; padding: 5px 10px; }
        .create-btn { background: white; color: #ff5e62; font-size: 18px; }
        #startBtn { background: #2ecc71; color: white; font-size: 18px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎉 Host Party</h1>
    <button class="create-btn" onclick="createParty()">Create New Party</button>
    
    <div id="code">----</div>

    <div class="playerBox">
        <h3>Players Joined</h3>
        <ul id="players"></ul>
        <p id="msg" style="color: #ff4757; font-weight: bold;">Waiting for players...</p>
        <button id="startBtn" onclick="startGame()" style="display:none;">🚀 START GAME</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let partyCode;
    let currentUser;

    // Monitor auth state so we have the Host's UID
    onAuthStateChanged(auth, (user) => {
        if (user) currentUser = user;
    });

    async function createParty() {
        if (!currentUser) {
            alert("Logging you in... please wait a second and try again.");
            return;
        }

        partyCode = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById("code").innerText = partyCode;

        const partyRef = ref(db, "parties/" + partyCode);

        // Auto-delete party if host closes tab
        onDisconnect(partyRef).remove();

        // INITIALIZE PARTY:
        // Notice we save 'hostId' but we DO NOT add currentUser.uid to the 'players' list.
        await set(partyRef, {
            created: serverTimestamp(),
            hostId: currentUser.uid,
            hostActive: true
        });

        console.log("Party created. Host is invisible (Server Mode).");
        listenPlayers();
    }

    function listenPlayers() {
        onValue(ref(db, "parties/" + partyCode + "/players"), (snapshot) => {
            let list = document.getElementById("players");
            list.innerHTML = "";
            let count = 0;

            if (snapshot.exists()) {
                snapshot.forEach(player => {
                    count++;
                    let data = player.val();
                    let uid = player.key;
                    let li = document.createElement("li");
                    li.innerHTML = `
                        <span>${data.name}</span>
                        <button class="kick-btn" onclick="kickPlayer('${uid}')">Kick</button>
                    `;
                    list.appendChild(li);
                });
            }

            // Show start button if 2 or more REAL players have joined
            if (count >= 2) {
                document.getElementById("startBtn").style.display = "block";
                document.getElementById("msg").style.display = "none";
            } else {
                document.getElementById("startBtn").style.display = "none";
                document.getElementById("msg").style.display = "block";
                document.getElementById("msg").innerText = `Waiting for players (${count}/2)...`;
            }
        });
    }

    function kickPlayer(uid) {
        remove(ref(db, `parties/${partyCode}/players/${uid}`));
    }

    function startGame() {
        set(ref(db, "parties/" + partyCode + "/gameState"), { status: "playing" });
        window.location.href = `Games/Word%20Bomb/game.html?code=${partyCode}`;
    }

    // Bind functions to window for the HTML buttons
    window.startGame = startGame;
    window.createParty = createParty;
    window.kickPlayer = kickPlayer;

</script>

</body>
</html>
