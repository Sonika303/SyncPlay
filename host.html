<!DOCTYPE html>
<html>
<head>
    <title>SyncPlay | Host Lobby</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            color: white;
            text-align: center;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 420px;
        }

        #code {
            font-size: 80px;
            margin: 10px 0;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.2); }

        .playerBox {
            background: white;
            color: black;
            width: 100%;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            max-height: 250px;
            overflow-y: auto;
            box-sizing: border-box;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        ul { list-style: none; padding: 0; margin: 0; }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .create-btn { background: white; color: #ff5e62; font-size: 18px; width: 100%; }
        #startBtn { background: #2ecc71; color: white; font-size: 20px; width: 100%; margin-top: 10px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .kick-btn { background: #ff4757; color: white; padding: 6px 12px; font-size: 11px; border-radius: 8px; }
        
        .status-msg { font-size: 13px; margin-top: 15px; opacity: 0.7; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎉 Host Party</h1>
    <button class="create-btn" id="createBtn" onclick="createParty()">Create New Party</button>
    
    <div id="lobbyArea" class="hidden">
        <div id="code">----</div>
        <button class="copy-btn" onclick="copyInviteLink()">🔗 Copy Invite Link</button>
        
        <div class="playerBox">
            <h3 style="margin-top:0; font-size: 16px; color: #666;">Players Ready</h3>
            <ul id="players"></ul>
            <p id="msg" style="color: #ff5e62; font-weight: bold; margin: 10px 0;">Waiting for players...</p>
            <button id="startBtn" onclick="startGame()" style="display:none;">🚀 START GAME</button>
        </div>
    </div>
    <div class="status-msg" id="statusMsg">Connecting...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, onDisconnect, serverTimestamp, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let partyCode;
    let currentUser;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("statusMsg").innerText = "Host Authenticated";
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) rejoinLobby(code);
        }
    });

    async function rejoinLobby(code) {
        partyCode = code;
        document.getElementById("code").innerText = partyCode;
        document.getElementById("createBtn").classList.add("hidden");
        document.getElementById("lobbyArea").classList.remove("hidden");
        
        // Reset game state to lobby mode so controllers switch UI
        await update(ref(db, `parties/${partyCode}/gameData`), { 
            status: "lobby",
            redirect: false,
            syllable: "LOBBY" // Clean up game artifacts
        });
        
        listenPlayers();
    }

    window.createParty = async function() {
        if (!currentUser) return;
        partyCode = Math.floor(1000 + Math.random() * 9000).toString();
        
        const newurl = window.location.origin + window.location.pathname + '?code=' + partyCode;
        window.history.pushState({path:newurl},'',newurl);

        await set(ref(db, "parties/" + partyCode), {
            created: serverTimestamp(),
            hostId: currentUser.uid,
            gameData: { status: "lobby", redirect: false }
        });

        rejoinLobby(partyCode);
    }

    function listenPlayers() {
        // We listen to the original 'players' node. 
        // Players remain in this node even after a game ends.
        onValue(ref(db, `parties/${partyCode}/players`), (snapshot) => {
            const list = document.getElementById("players");
            const startBtn = document.getElementById("startBtn");
            const msg = document.getElementById("msg");
            list.innerHTML = "";
            
            if (snapshot.exists()) {
                const players = snapshot.val();
                Object.keys(players).forEach(uid => {
                    const li = document.createElement("li");
                    li.style.borderLeft = `5px solid ${players[uid].color || '#eee'}`;
                    li.style.paddingLeft = "10px";
                    li.innerHTML = `
                        <span>${players[uid].name}</span>
                        <button class="kick-btn" onclick="kickPlayer('${uid}')">Kick</button>
                    `;
                    list.appendChild(li);
                });
                startBtn.style.display = "block";
                msg.style.display = "none";
            } else {
                startBtn.style.display = "none";
                msg.style.display = "block";
                msg.innerText = "Waiting for players...";
            }
        });
    }

    window.copyInviteLink = function() {
        // Assuming your join page is index.html in the root
        const joinLink = window.location.origin + "/SyncPlay/index.html?join=" + partyCode;
        navigator.clipboard.writeText(joinLink).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "✅ Link Copied!";
            setTimeout(() => btn.innerText = "🔗 Copy Invite Link", 2000);
        });
    }

    window.kickPlayer = (uid) => {
        if(confirm("Kick this player?")) {
            remove(ref(db, `parties/${partyCode}/players/${uid}`));
            // Also remove from active game data just in case
            remove(ref(db, `parties/${partyCode}/playersData/${uid}`));
        }
    };

    window.startGame = async () => {
        // Just set status to playing. The game.js on the next page will handle re-init.
        await update(ref(db, `parties/${partyCode}/gameData`), { status: "playing" });
        window.location.href = `Games/Word Bomb/game.html?code=${partyCode}`;
    };
</script>
</body>
</html>
