<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPlay | Host Lobby</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #6c5ce7;
            --danger: #ff7675;
            --success: #00b894;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #2d3436;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 4px solid white;
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 { font-weight: 800; font-size: 2rem; margin-top: 0; letter-spacing: -1px; }

        /* --- CODE SECTION --- */
        #codeContainer {
            background: #f1f2f6;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
            cursor: pointer;
            position: relative;
        }
        #codeContainer:hover { transform: scale(1.02); background: #e8e9ed; }
        #code {
            font-size: 64px;
            font-weight: 800;
            display: block;
            color: var(--primary);
            letter-spacing: 8px;
        }
        .copy-hint { font-size: 12px; color: #b2bec3; font-weight: 700; text-transform: uppercase; }

        /* --- PLAYER LIST --- */
        .player-area {
            background: white;
            border-radius: 24px;
            border: 2px solid #f1f2f6;
            margin: 25px 0;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 18px;
        }

        .player-name { flex: 1; text-align: left; font-weight: 700; color: #2d3436; }

        /* --- BUTTONS --- */
        button {
            padding: 18px;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .create-btn { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3); }
        .start-btn { background: var(--success); color: white; box-shadow: 0 10px 20px rgba(0, 184, 148, 0.3); }
        .kick-btn { 
            width: auto; padding: 8px; background: #ffeaa7; color: #d63031; 
            border-radius: 10px; font-size: 12px; 
        }
        
        button:active { transform: scale(0.95); }
        button:disabled { background: #dfe6e9; cursor: not-allowed; box-shadow: none; }

        .hidden { display: none !important; }
        .status-pill {
            display: inline-block;
            padding: 6px 12px;
            background: #f1f2f6;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            color: #b2bec3;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i data-lucide="crown" style="color:#fdcb6e"></i> Host Lobby</h1>
    
    <button class="create-btn" id="createBtn" onclick="createParty()">
        <i data-lucide="plus-circle"></i> Create New Party
    </button>
    
    <div id="lobbyArea" class="hidden">
        <div id="codeContainer" onclick="copyCode()">
            <span class="copy-hint">Tap to Copy</span>
            <div id="code">----</div>
        </div>

        <div class="player-area">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                <span style="font-weight:800; color:#b2bec3; font-size:12px;">PLAYERS</span>
                <span id="playerCount" style="background:var(--primary); color:white; padding:2px 8px; border-radius:8px; font-size:12px;">0</span>
            </div>
            <ul id="players"></ul>
            <p id="msg" style="color: #b2bec3; font-size: 14px; margin: 20px 0;">Waiting for squad to join...</p>
        </div>

        <button id="startBtn" class="start-btn hidden" onclick="startGame()">
            <i data-lucide="rocket"></i> START GAME
        </button>
    </div>

    <div class="status-pill" id="statusMsg">Connecting to Server...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, onDisconnect, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let partyCode;
    let currentUser;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("statusMsg").innerText = "Ready to Host";
            const urlParams = new URLSearchParams(window.location.search);
            const existingCode = urlParams.get('code');
            if (existingCode) rejoinLobby(existingCode);
        }
    });

    async function rejoinLobby(code) {
        partyCode = code;
        setupUI();
        await update(ref(db, `parties/${partyCode}/gameData`), { status: "lobby", syllable: "LOBBY" });
        setupHostPresence();
        listenPlayers();
    }

    window.createParty = async function() {
        if (!currentUser) return;
        partyCode = Math.floor(1000 + Math.random() * 9000).toString();
        
        // Update URL
        const newurl = window.location.origin + window.location.pathname + '?code=' + partyCode;
        window.history.pushState({path:newurl},'',newurl);

        setupUI();
        
        await set(ref(db, "parties/" + partyCode), {
            created: serverTimestamp(),
            hostId: currentUser.uid,
            hostActive: true,
            gameData: { status: "lobby", syllable: "LOBBY" }
        });

        setupHostPresence();
        listenPlayers();
    }

    function setupUI() {
        document.getElementById("code").innerText = partyCode;
        document.getElementById("createBtn").classList.add("hidden");
        document.getElementById("lobbyArea").classList.remove("hidden");
    }

    function setupHostPresence() {
        const hostRef = ref(db, `parties/${partyCode}/hostActive`);
        onDisconnect(hostRef).set(false);
        set(hostRef, true);
    }

    function listenPlayers() {
        onValue(ref(db, `parties/${partyCode}/players`), (snapshot) => {
            const list = document.getElementById("players");
            const startBtn = document.getElementById("startBtn");
            const msg = document.getElementById("msg");
            const countLabel = document.getElementById("playerCount");
            
            list.innerHTML = "";
            let count = 0;

            if (snapshot.exists()) {
                const players = snapshot.val();
                Object.keys(players).forEach(uid => {
                    count++;
                    const p = players[uid];
                    const char = p.name ? p.name.charAt(0).toUpperCase() : "?";
                    
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <div class="mini-avatar" style="background:${p.color || '#6c5ce7'}">${char}</div>
                        <span class="player-name">${p.name}</span>
                        <button class="kick-btn" onclick="kickPlayer('${uid}')"><i data-lucide="user-minus"></i></button>
                    `;
                    list.appendChild(li);
                });
            }

            countLabel.innerText = count;
            lucide.createIcons();

            if (count >= 1) { 
                startBtn.classList.remove("hidden");
                msg.classList.add("hidden");
            } else {
                startBtn.classList.add("hidden");
                msg.classList.remove("hidden");
            }
        });
    }

    window.copyCode = () => {
        navigator.clipboard.writeText(partyCode);
        const codeEl = document.getElementById("code");
        const originalCode = codeEl.innerText;
        codeEl.innerText = "COPIED!";
        setTimeout(() => codeEl.innerText = originalCode, 1000);
    };

    window.kickPlayer = (uid) => {
        if(confirm("Kick this player?")) remove(ref(db, `parties/${partyCode}/players/${uid}`));
    };

    window.startGame = async function() {
        const startBtn = document.getElementById("startBtn");
        startBtn.disabled = true;
        startBtn.innerText = "LAUNCHING...";

        await remove(ref(db, `parties/${partyCode}/playersData`));
        await update(ref(db, `parties/${partyCode}/gameData`), { status: "playing" });

        window.location.href = `Games/Word Bomb/game.html?code=${partyCode}`;
    }

    lucide.createIcons();
</script>
</body>
</html>
