<!DOCTYPE html>
<html>
<head>
<title>Host Party</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
margin:0;
color:white;
}

.container{
margin-top:100px;
}

#code{
font-size:60px;
font-weight:bold;
margin:20px;
}

.playerBox{
background:white;
color:black;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:6px;
border-bottom:1px solid #ddd;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:white;
color:#333;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>🎉 Host Party</h1>

<button onclick="createParty()">Create Party</button>

<div id="code">----</div>

<div class="playerBox">

<h3>Players Joined</h3>

<ul id="players"></ul>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
authDomain: "syncplay-17b6e.firebaseapp.com",
databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
projectId: "syncplay-17b6e",
storageBucket: "syncplay-17b6e.firebasestorage.app",
messagingSenderId: "86016195929",
appId: "1:86016195929:web:40262a28786f2ead712048"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let partyCode;

function createParty(){

partyCode=Math.floor(1000+Math.random()*9000);

document.getElementById("code").innerText=partyCode;

set(ref(db,"parties/"+partyCode),{
created:Date.now()
});

listenPlayers();

}

function listenPlayers(){

onValue(ref(db,"parties/"+partyCode+"/players"),(snapshot)=>{

let list=document.getElementById("players");

list.innerHTML="";

snapshot.forEach(player=>{

let li=document.createElement("li");

li.innerText=player.val().name;

list.appendChild(li);

});

});

}

window.createParty=createParty;

</script>

</body>
</html>
