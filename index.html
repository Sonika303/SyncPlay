<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPlay | Word Bomb</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #2ecc71;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 360px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 3px solid white;
        }

        h1 { margin-bottom: 30px; letter-spacing: 2px; font-size: 2.5rem; }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            margin: 10px 0;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: all 0.2s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.98); }

        .btn-google { background: white; color: var(--secondary); }
        .btn-join { background: var(--accent); color: white; }
        .btn-host { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; }
        .btn-settings { position: absolute; top: 20px; right: 20px; width: auto; background: none; border: 1px solid white; padding: 8px 15px; }

        input {
            padding: 14px;
            border-radius: 10px;
            border: none;
            margin: 10px 0;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.9);
            font-size: 16px;
            color: #333;
        }

        #settings {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .settings-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
        }

        .color-picker {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .color-opt {
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ddd;
        }

        .color-opt.active { border-color: #333; transform: scale(1.2); }

        #partyScreen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button id="setBtn" class="btn-settings" onclick="toggleSettings()" style="display:none">⚙ Settings</button>
    
    <h1>🎬 SyncPlay</h1>

    <div id="login">
        <p>Challenge your friends in Word Bomb!</p>
        <button class="btn-google" onclick="googleLogin()">Sign in with Google</button>
    </div>

    <div id="mainUI" style="display:none">
        <div id="avatarCircle" class="avatar">?</div>
        <h2 id="welcome">Welcome</h2>
        
        <input id="partyCode" type="text" maxlength="4" placeholder="Enter 4-Digit Code">
        <button class="btn-join" onclick="joinParty()">Join Party</button>
        <button class="btn-host" onclick="createParty()">Host a Game</button>
    </div>

    <div id="partyScreen">
        <h2 id="partyTitle">Lobby</h2>
        <p>Waiting for the host to ignite the bomb...</p>
        <div style="margin: 20px auto;" class="avatar" id="lobbyAvatar">?</div>
        <p id="lobbyStatus" style="font-size: 12px; opacity: 0.7;">Connected to Lobby</p>
    </div>
</div>

<div id="settings">
    <div class="settings-content">
        <h3>Profile Settings</h3>
        <p id="emailDisplay" style="font-size: 12px; color: #777;"></p>
        
        <label>Change Username</label>
        <input id="usernameInput" type="text" placeholder="Username">

        <label>Profile Color</label>
        <div class="color-picker" id="colorPicker"></div>

        <button class="btn-join" onclick="saveSettings()">Save Changes</button>
        <button style="background:#eee; color:#333" onclick="toggleSettings()">Cancel</button>
        <hr>
        <button style="background:var(--danger); color:white" onclick="logout()">Logout</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser;
    let selectedColor = "#ff5e62"; 
    const profileColors = ["#ff5e62", "#2ecc71", "#3498db", "#f1c40f", "#9b59b6", "#e67e22"];

    const cp = document.getElementById("colorPicker");
    profileColors.forEach(color => {
        let div = document.createElement("div");
        div.className = "color-opt";
        div.style.background = color;
        div.onclick = () => selectColor(color, div);
        cp.appendChild(div);
    });

    function selectColor(color, element) {
        selectedColor = color;
        document.querySelectorAll(".color-opt").forEach(el => el.classList.remove("active"));
        element.classList.add("active");
    }

    window.googleLogin = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("login").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
            document.getElementById("setBtn").style.display = "block";

            const userRef = ref(db, "users/" + user.uid);
            const snap = await get(userRef);
            
            let username = user.displayName ? user.displayName.split(' ')[0] : "Player";
            let color = selectedColor;

            if (snap.exists()) {
                const data = snap.val();
                username = data.username || username;
                color = data.profileColor || color;
            }

            selectedColor = color;
            await update(userRef, {
                username: username,
                email: user.email,
                profileColor: color,
                lastLogin: serverTimestamp()
            });

            updateUI(username, color);
        }
    });

    function updateUI(name, color) {
        const initials = name.charAt(0).toUpperCase();
        document.getElementById("avatarCircle").innerText = initials;
        document.getElementById("avatarCircle").style.background = color;
        document.getElementById("lobbyAvatar").innerText = initials;
        document.getElementById("lobbyAvatar").style.background = color;
        document.getElementById("welcome").innerText = "Hey, " + name;
        document.getElementById("usernameInput").value = name;
        document.getElementById("emailDisplay").innerText = currentUser.email;
    }

    window.joinParty = async () => {
        const code = document.getElementById("partyCode").value.trim();
        if (!code) return;

        const partyRef = ref(db, "parties/" + code);
        const snap = await get(partyRef);

        if (snap.exists()) {
            const userSnap = await get(ref(db, "users/" + currentUser.uid));
            const userData = userSnap.val();
            const playerPath = `parties/${code}/players/${currentUser.uid}`;
            const playerRef = ref(db, playerPath);
            
            // 1. Add player to DB
            await set(playerRef, {
                name: userData.username,
                color: userData.profileColor,
                joinedAt: serverTimestamp()
            });

            // 2. Initial Disconnect setup (for if they close the tab now)
            let disconnectRef = onDisconnect(playerRef);
            await disconnectRef.remove();

            // 3. UI Switch
            document.getElementById("mainUI").style.display = "none";
            document.getElementById("setBtn").style.display = "none";
            document.getElementById("partyScreen").style.display = "block";
            document.getElementById("partyTitle").innerText = "Party: " + code;

            // 4. Listen for Game Start
            onValue(ref(db, `parties/${code}/gameState`), async (gSnap) => {
                if (gSnap.exists() && gSnap.val().status === "playing") {
                    console.log("🚀 Redirecting... cancelling auto-remove.");
                    
                    // --- CRITICAL FIX ---
                    // Cancel the disconnect trigger so the data survives the page hop
                    await disconnectRef.cancel(); 
                    
                    // Small delay to ensure Firebase processes the cancel before redirect
                    setTimeout(() => {
                        window.location.href = `Games/Word%20Bomb/controller.html?code=${code}`;
                    }, 300);
                }
            });
        } else {
            alert("Party not found!");
        }
    };

    window.saveSettings = async () => {
        const name = document.getElementById("usernameInput").value;
        if (!name) return;
        await update(ref(db, "users/" + currentUser.uid), {
            username: name,
            profileColor: selectedColor
        });
        updateUI(name, selectedColor);
        toggleSettings();
    };

    window.toggleSettings = () => {
        const s = document.getElementById("settings");
        s.style.display = (s.style.display === "flex") ? "none" : "flex";
    };

    window.logout = () => signOut(auth).then(() => location.reload());
    window.createParty = () => window.location.href = "host.html";

</script>
</body>
</html>
