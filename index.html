<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncPlay | Word Bomb</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #667eea;
            --accent: #2ecc71;
            --danger: #ff4757;
            --bg-dark: #0f0f1a;
            --card-bg: #1a1a2e;
            --user-color: #667eea;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease-out;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* PERFORMANCE OPTIMIZED BACKGROUND */
        .static-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0f1a 0%, #16213e 100%);
            z-index: -1;
        }

        .glow-overlay {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: var(--user-color);
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            position: relative;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: var(--user-color);
        }

        h1 { margin: 0 0 10px 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        p { opacity: 0.6; margin-bottom: 25px; font-size: 0.9rem; }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 16px; top: 14px; color: #666; pointer-events: none; z-index: 2;}

        input[type="text"] {
            padding: 14px 14px 14px 48px;
            border-radius: 14px;
            border: 2px solid transparent;
            width: 100%;
            background: #ffffff;
            font-size: 16px;
            font-weight: 700;
            color: #111;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            margin: 6px 0;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active { transform: scale(0.97); }

        .btn-google { background: white; color: #111; }
        .btn-join { background: var(--accent); color: white; }
        .btn-host { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        
        .btn-settings { 
            position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; 
            background: rgba(255,255,255,0.05); border-radius: 10px; color: white; padding: 0;
        }

        #settings {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .settings-content {
            background: white; color: #111; padding: 30px; border-radius: 28px;
            width: 90%; max-width: 360px; text-align: center;
        }

        .color-picker {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0;
        }

        .color-opt {
            width: 100%; aspect-ratio: 1; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent;
        }

        .color-opt.active { border-color: #000; transform: scale(1.05); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="static-bg"></div>
<div class="glow-overlay" id="glow"></div>

<div class="container">
    <button id="setBtn" class="btn-settings" onclick="toggleSettings()" style="display:none">
        <i data-lucide="settings"></i>
    </button>
    
    <h1>🎬 SyncPlay</h1>

    <div id="login">
        <p>Challenge friends in the arena of words.</p>
        <button class="btn-google" onclick="googleLogin()">
            <i data-lucide="log-in"></i> Sign in with Google
        </button>
    </div>

    <div id="mainUI" style="display:none">
        <div id="avatarCircle" class="avatar">?</div>
        <h2 id="welcome" style="margin:0 0 20px 0; font-size: 1.4rem;">Welcome!</h2>
        
        <div class="input-group">
            <i data-lucide="hash"></i>
            <input id="partyCode" type="text" maxlength="4" placeholder="Enter Room Code" autocomplete="off">
        </div>
        <button class="btn-join" onclick="joinParty()">
            <i data-lucide="zap"></i> Join Party
        </button>
        <button class="btn-host" onclick="goToHost()">
            <i data-lucide="crown"></i> Host Game
        </button>
    </div>

    <div id="partyScreen" class="hidden">
        <h2 id="partyTitle">Room Lobby</h2>
        <div style="margin: 20px auto;" class="avatar" id="lobbyAvatar">?</div>
        <p id="lobbyStatus" style="font-weight: 800; color: var(--accent);">WAITING FOR HOST...</p>
        <p style="font-size: 12px; opacity: 0.5;">Room: <span id="displayRoomCode">----</span></p>
    </div>
</div>

<div id="settings">
    <div class="settings-content">
        <h3 style="margin-top:0">Profile</h3>
        <div id="previewAvatar" class="avatar">?</div>
        
        <div class="input-group" style="margin-top: 15px;">
            <i data-lucide="user"></i>
            <input id="usernameInput" type="text" placeholder="Your Name" oninput="updatePreview()">
        </div>

        <div class="color-picker" id="colorPicker"></div>

        <button class="btn-join" onclick="saveSettings()">Save Changes</button>
        <button style="background:#eee; color:#444" onclick="toggleSettings()">Cancel</button>
        <button style="background:none; color:var(--danger); font-size: 14px;" onclick="logout()">Sign Out</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser;
    let selectedColor = "#667eea"; 
    const profileColors = ["#ff5e62", "#ff9966", "#f1c40f", "#2ecc71", "#1abc9c", "#3498db", "#9b59b6", "#e67e22", "#eb4d4b", "#667eea"];

    lucide.createIcons();

    // Init Color Swatches
    const cp = document.getElementById("colorPicker");
    profileColors.forEach(color => {
        let div = document.createElement("div");
        div.className = "color-opt";
        div.style.background = color;
        div.onclick = () => {
            selectedColor = color;
            document.querySelectorAll(".color-opt").forEach(el => el.classList.remove("active"));
            div.classList.add("active");
            updatePreview();
        };
        cp.appendChild(div);
    });

    window.updatePreview = () => {
        const name = document.getElementById("usernameInput").value || "?";
        const char = name.charAt(0).toUpperCase();
        document.getElementById("previewAvatar").innerText = char;
        document.getElementById("previewAvatar").style.background = selectedColor;
        document.documentElement.style.setProperty('--user-color', selectedColor);
    };

    window.googleLogin = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("login").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
            document.getElementById("setBtn").style.display = "block";

            const userRef = ref(db, "users/" + user.uid);
            const snap = await get(userRef);
            
            let username = user.displayName ? user.displayName.split(' ')[0] : "Player";
            if (snap.exists()) {
                username = snap.val().username || username;
                selectedColor = snap.val().profileColor || selectedColor;
            }
            updateUI(username, selectedColor);
        }
    });

    function updateUI(name, color) {
        const initials = name.charAt(0).toUpperCase();
        ["avatarCircle", "lobbyAvatar", "previewAvatar"].forEach(id => {
            const el = document.getElementById(id);
            if(el) { el.innerText = initials; el.style.background = color; }
        });
        document.getElementById("welcome").innerText = "Hey, " + name + "!";
        document.getElementById("usernameInput").value = name;
        updatePreview();
    }

    // REDIRECT TO YOUR HOST FILE
    window.goToHost = () => {
        window.location.href = "host.html";
    };

    window.joinParty = async () => {
        const code = document.getElementById("partyCode").value.trim();
        if (!code) return;
        const partyRef = ref(db, "parties/" + code);
        const snap = await get(partyRef);

        if (snap.exists()) {
            const playerRef = ref(db, `parties/${code}/players/${currentUser.uid}`);
            await set(playerRef, { 
                name: document.getElementById("usernameInput").value, 
                color: selectedColor, 
                joinedAt: serverTimestamp() 
            });
            onDisconnect(playerRef).remove();
            
            // Switch to player lobby view
            document.getElementById("mainUI").style.display = "none";
            document.getElementById("displayRoomCode").innerText = code;
            document.getElementById("partyScreen").classList.remove("hidden");

            // Listen for game start
            onValue(ref(db, `parties/${code}/gameData`), (gsnap) => {
                if(gsnap.exists() && gsnap.val().status === "playing") {
                    window.location.href = `Games/Word Bomb/game.html?code=${code}`;
                }
            });
        } else { alert("Room not found!"); }
    };

    window.saveSettings = async () => {
        const name = document.getElementById("usernameInput").value;
        if (!name) return;
        await update(ref(db, "users/" + currentUser.uid), { username: name, profileColor: selectedColor });
        updateUI(name, selectedColor);
        toggleSettings();
    };

    window.toggleSettings = () => {
        const s = document.getElementById("settings");
        s.style.display = (s.style.display === "flex") ? "none" : "flex";
    };

    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
