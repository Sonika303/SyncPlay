<!DOCTYPE html>
<html>
<head>
<title>SyncPlay</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

.container{
margin-top:120px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
margin:8px;
cursor:pointer;
font-weight:bold;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:6px;
}

#settings{
background:white;
color:black;
padding:20px;
width:300px;
margin:auto;
border-radius:10px;
display:none;
}

#partyScreen{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🎬 SyncPlay</h1>

<div id="login">
<button onclick="googleLogin()">Sign in with Google</button>
</div>

<div id="mainUI" style="display:none">

<h2 id="welcome"></h2>

<button onclick="toggleSettings()">⚙ Settings</button>

<br><br>

<input id="partyCode" placeholder="Enter Party Code">

<button onclick="joinParty()">Join Party</button>

<br><br>

<button onclick="createParty()">Create Party</button>

</div>

<div id="partyScreen">

<h2 id="partyTitle"></h2>

<p>You have joined this party.</p>

</div>

</div>

<div id="settings">

<h3>Settings</h3>

<p id="email"></p>

<input id="usernameInput" placeholder="Enter username">

<br><br>

<button onclick="saveUsername()">Save Username</button>

<br><br>

<button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
authDomain: "syncplay-17b6e.firebaseapp.com",
databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
projectId: "syncplay-17b6e",
storageBucket: "syncplay-17b6e.firebasestorage.app",
messagingSenderId: "86016195929",
appId: "1:86016195929:web:40262a28786f2ead712048"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

let currentUser;

function googleLogin(){
signInWithPopup(auth,provider);
}

onAuthStateChanged(auth, async(user)=>{

if(user){

currentUser=user;

document.getElementById("login").style.display="none";
document.getElementById("mainUI").style.display="block";

let snap=await get(ref(db,"users/"+user.uid+"/username"));

let username;

if(snap.exists()){
username=snap.val();
}else{
username="Player";
}

document.getElementById("welcome").innerText="Welcome "+username;

document.getElementById("email").innerText=user.email;

document.getElementById("usernameInput").value=username;

}

});

function toggleSettings(){

let s=document.getElementById("settings");

s.style.display=s.style.display==="none"?"block":"none";

}

function saveUsername(){

let name=document.getElementById("usernameInput").value;

set(ref(db,"users/"+currentUser.uid+"/username"),name);

document.getElementById("welcome").innerText="Welcome "+name;

alert("Username saved");

}

function logout(){

signOut(auth);
location.reload();

}

function createParty(){

window.location.href="host.html";

}

async function joinParty(){

let code=document.getElementById("partyCode").value;

let snap=await get(ref(db,"parties/"+code));

if(snap.exists()){

let userSnap=await get(ref(db,"users/"+currentUser.uid+"/username"));

let username=userSnap.exists()?userSnap.val():"Player";

await set(ref(db,"parties/"+code+"/players/"+currentUser.uid),{
name:username
});

document.getElementById("mainUI").style.display="none";
document.getElementById("partyScreen").style.display="block";

document.getElementById("partyTitle").innerText="Party "+code;
onValue(ref(db, "parties/" + code + "/gameState"), (snap) => {
    if (snap.exists() && snap.val().status === "playing") {
        window.location.href = `Games/WordBomb/game.html?code=${code}`;
    }
});

watchKick(code);

}else{

alert("Party not found");

}

}

function watchKick(code){

onValue(ref(db,"parties/"+code+"/players/"+currentUser.uid),(snap)=>{

if(!snap.exists()){
alert("You were kicked from the party");
location.reload();
}

});

}

window.googleLogin=googleLogin;
window.toggleSettings=toggleSettings;
window.saveUsername=saveUsername;
window.logout=logout;
window.createParty=createParty;
window.joinParty=joinParty;

</script>

</body>
</html>
