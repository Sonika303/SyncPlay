<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncPlay | Word Bomb</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --primary: #6c5ce7;
            --accent: #00b894;
            --danger: #ff7675;
            --bg-joy: #fab1a0;
            --user-color: #6c5ce7;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(45deg, #a29bfe, #fab1a0, #81ecec, #ffeaa7);
            background-size: 400% 400%;
            animation: joyFlow 15s ease infinite;
        }

        @keyframes joyFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            border: 4px solid white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 420px;
            text-align: center;
            z-index: 10;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 35px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            font-weight: 800;
            color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            background: var(--user-color);
        }

        h1 { margin: 0; font-size: 2.5rem; font-weight: 800; color: #2d3436; letter-spacing: -1.5px; }
        p { color: #636e72; margin-bottom: 30px; font-weight: 600; }

        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 18px; top: 16px; color: #b2bec3; z-index: 2; }

        input[type="text"] {
            padding: 16px 16px 16px 55px;
            border-radius: 20px;
            border: 3px solid transparent;
            width: 100%;
            background: #f1f2f6;
            font-size: 18px;
            font-weight: 700;
            color: #2d3436;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--user-color); background: white; }

        button {
            padding: 18px;
            border: none;
            border-radius: 20px;
            margin: 8px 0;
            cursor: pointer;
            font-weight: 800;
            width: 100%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        button:active { transform: scale(0.95); }

        .btn-google { background: #2d3436; color: white; }
        .btn-join { background: var(--user-color); color: white; box-shadow: 0 10px 20px -5px var(--user-color); }
        .btn-host { background: white; color: #2d3436; border: 3px solid #f1f2f6; }
        
        .btn-settings { 
            position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; 
            background: white; border-radius: 18px; color: #2d3436; padding: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 100;
        }

        /* --- PAGES --- */
        #settingsPage, #colorSubPage {
            position: fixed; inset: 0; background: #f9f9fb;
            display: none; flex-direction: column; z-index: 2000;
            padding: 40px 20px; overflow-y: auto;
        }

        .settings-header { display: flex; align-items: center; justify-content: space-between; max-width: 600px; margin: 0 auto 30px; width: 100%; }

        /* SubCategory Trigger Button */
        .subcat-btn {
            background: white; border-radius: 25px; padding: 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); cursor: pointer;
            margin-bottom: 25px; border: 2px solid transparent;
        }
        .subcat-btn:hover { border-color: var(--user-color); }

        .color-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); 
            gap: 10px; margin-top: 20px;
        }

        .color-cell {
            aspect-ratio: 1; border-radius: 12px; cursor: pointer;
            border: 4px solid transparent;
        }
        .color-cell.active { border-color: #2d3436; transform: scale(1.1); }

        .custom-picker-box {
            display: flex; align-items: center; gap: 15px; margin-bottom: 20px;
            padding: 15px; background: white; border-radius: 20px; border: 2px solid #f1f2f6;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button id="setBtn" class="btn-settings" onclick="toggleSettings()" style="display:none">
        <i data-lucide="settings"></i>
    </button>
    
    <h1>SyncPlay</h1>
    <p>Word Bomb Arena</p>

    <div id="login">
        <button class="btn-google" onclick="googleLogin()">
            <i data-lucide="log-in"></i> Play with Google
        </button>
    </div>

    <div id="mainUI" style="display:none">
        <div id="avatarCircle" class="avatar">?</div>
        <h2 id="welcome" style="margin:0 0 25px 0; color: #2d3436;">Welcome!</h2>
        
        <div class="input-group">
            <i data-lucide="ticket"></i>
            <input id="partyCode" type="text" maxlength="4" placeholder="Room Code" autocomplete="off">
        </div>
        <button class="btn-join" onclick="joinParty()">Join Room</button>
        <button class="btn-host" onclick="goToHost()">Create Room</button>
    </div>

    <div id="partyScreen" class="hidden">
        <div class="avatar" id="lobbyAvatar">?</div>
        <h2 id="lobbyStatus" style="color: var(--user-color);">Waiting for Host...</h2>
        <p>Code: <span id="displayRoomCode" style="color:#2d3436">----</span></p>
    </div>
</div>

<div id="settingsPage">
    <div class="settings-header">
        <h2 style="font-weight: 800; margin:0;">Profile Designer</h2>
        <button onclick="toggleSettings()" style="width: auto; padding: 10px 20px; background: #eee; color: #444;">Close</button>
    </div>

    <div style="max-width: 500px; margin: 0 auto; width: 100%;">
        <div class="avatar" id="previewAvatar" style="width: 120px; height: 120px; font-size: 55px;">?</div>
        
        <div class="input-group" style="margin-top: 20px;">
            <i data-lucide="user"></i>
            <input id="usernameInput" type="text" placeholder="Your Display Name" oninput="updatePreview()">
        </div>

        <div style="text-align: left; margin: 30px 0 10px 10px; font-weight: 800; color: #b2bec3; font-size: 12px;">PREFERENCES</div>
        
        <div class="subcat-btn" onclick="toggleColorPage()">
            <div style="display:flex; align-items:center; gap:15px;">
                <div style="background:var(--user-color); color:white; width:45px; height:45px; border-radius:12px; display:flex; align-items:center; justify-content:center;">
                    <i data-lucide="palette"></i>
                </div>
                <div>
                    <div style="font-weight: 800; color:#2d3436;">SubCategories</div>
                    <div style="font-size: 12px; color:#b2bec3;">Colors, Theme & Customs</div>
                </div>
            </div>
            <i data-lucide="chevron-right" style="color:#b2bec3"></i>
        </div>

        <button class="btn-join" onclick="saveSettings()">Apply Profile</button>
        <button style="background:none; color:var(--danger);" onclick="logout()">Sign Out</button>
    </div>
</div>

<div id="colorSubPage">
    <div class="settings-header">
        <button onclick="toggleColorPage()" style="width:auto; padding:10px; background:none; color:#2d3436;">
            <i data-lucide="arrow-left"></i>
        </button>
        <h2 style="font-weight: 800; margin:0;">The Color Vault</h2>
        <div style="width:40px;"></div>
    </div>

    <div style="max-width: 500px; margin: 0 auto; width: 100%;">
        <div class="custom-picker-box">
            <input type="color" id="customColorInput" oninput="pickCustomColor(this.value)" style="width:50px; height:50px; border:none; background:none; cursor:pointer;">
            <div>
                <div style="font-size: 12px; font-weight: 800; color: #b2bec3;">HEX CODE</div>
                <div id="hexDisplay" style="font-size: 16px; font-weight: 700;">#6C5CE7</div>
            </div>
        </div>

        <div style="font-weight: 800; font-size: 14px; color: #636e72; margin-top:20px;">PRESET PALETTE (100 COLORS)</div>
        <div class="color-grid" id="colorGrid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser;
    let selectedColor = "#6c5ce7";
    
    // Generate 100 Colors
    const palette = [];
    for(let i=0; i<100; i++) {
        palette.push(`hsl(${Math.floor(i * 3.6)}, 75%, 60%)`);
    }

    // Populate Grid
    const grid = document.getElementById("colorGrid");
    palette.forEach(color => {
        const cell = document.createElement("div");
        cell.className = "color-cell";
        cell.style.background = color;
        cell.onclick = () => {
            selectedColor = color;
            document.querySelectorAll(".color-cell").forEach(c => c.classList.remove("active"));
            cell.classList.add("active");
            updatePreview();
        };
        grid.appendChild(cell);
    });

    window.toggleSettings = () => {
        const page = document.getElementById("settingsPage");
        page.style.display = (page.style.display === "flex") ? "none" : "flex";
    };

    window.toggleColorPage = () => {
        const page = document.getElementById("colorSubPage");
        page.style.display = (page.style.display === "flex") ? "none" : "flex";
    };

    window.pickCustomColor = (hex) => {
        selectedColor = hex;
        document.querySelectorAll(".color-cell").forEach(c => c.classList.remove("active"));
        updatePreview();
    };

    window.updatePreview = () => {
        const name = document.getElementById("usernameInput").value || "?";
        const char = name.charAt(0).toUpperCase();
        document.getElementById("previewAvatar").innerText = char;
        document.getElementById("previewAvatar").style.background = selectedColor;
        document.getElementById("hexDisplay").innerText = selectedColor.toUpperCase();
        document.documentElement.style.setProperty('--user-color', selectedColor);
    };

    window.googleLogin = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("login").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
            document.getElementById("setBtn").style.display = "block";

            const snap = await get(ref(db, "users/" + user.uid));
            let username = user.displayName ? user.displayName.split(' ')[0] : "Player";
            
            if (snap.exists()) {
                username = snap.val().username || username;
                selectedColor = snap.val().profileColor || selectedColor;
            }
            updateUI(username, selectedColor);
        }
    });

    function updateUI(name, color) {
        const char = name.charAt(0).toUpperCase();
        ["avatarCircle", "lobbyAvatar", "previewAvatar"].forEach(id => {
            const el = document.getElementById(id);
            if(el) { el.innerText = char; el.style.background = color; }
        });
        document.getElementById("welcome").innerText = "Hey, " + name + "!";
        document.getElementById("usernameInput").value = name;
        document.documentElement.style.setProperty('--user-color', color);
    }

    window.saveSettings = async () => {
        const name = document.getElementById("usernameInput").value;
        if (!name) return;
        await update(ref(db, "users/" + currentUser.uid), { username: name, profileColor: selectedColor });
        updateUI(name, selectedColor);
        toggleSettings();
    };

    window.goToHost = () => window.location.href = "host.html";

    window.joinParty = async () => {
        const code = document.getElementById("partyCode").value.trim();
        if (!code) return;
        const snap = await get(ref(db, "parties/" + code));

        if (snap.exists()) {
            const playerRef = ref(db, `parties/${code}/players/${currentUser.uid}`);
            await set(playerRef, { 
                name: document.getElementById("usernameInput").value, 
                color: selectedColor, 
                joinedAt: serverTimestamp() 
            });
            onDisconnect(playerRef).remove();
            
            document.getElementById("mainUI").style.display = "none";
            document.getElementById("displayRoomCode").innerText = code;
            document.getElementById("partyScreen").classList.remove("hidden");

            onValue(ref(db, `parties/${code}/gameData`), (gsnap) => {
                if(gsnap.exists() && gsnap.val().status === "playing") {
                    window.location.href = `Games/Word Bomb/game.html?code=${code}`;
                }
            });
        } else { alert("Room not found!"); }
    };

    window.logout = () => signOut(auth).then(() => location.reload());
    lucide.createIcons();
</script>
</body>
</html>
