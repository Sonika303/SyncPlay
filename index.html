<!DOCTYPE html>
<html>
<head>
<title>Party System</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:120px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
}
</style>

</head>

<body>

<h1>Party Lobby</h1>

<h2>Join Party</h2>
<input id="partyCode" placeholder="Enter 4 digit code">
<button onclick="joinParty()">Join</button>

<br><br>

<h2>Or</h2>

<button onclick="createParty()">Create Party</button>

<p id="result"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
  authDomain: "syncplay-17b6e.firebaseapp.com",
  databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
  projectId: "syncplay-17b6e",
  storageBucket: "syncplay-17b6e.firebasestorage.app",
  messagingSenderId: "86016195929",
  appId: "1:86016195929:web:40262a28786f2ead712048",
  measurementId: "G-3NBT4GJ0FX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function joinParty(){

let code = document.getElementById("partyCode").value;

const snapshot = await get(ref(db,"parties/"+code));

if(snapshot.exists()){
document.getElementById("result").innerText="✅ Joined Party!";
}
else{
document.getElementById("result").innerText="❌ Party not found";
}

}

function createParty(){
window.location.href="host.html";
}

window.joinParty = joinParty;
window.createParty = createParty;

</script>

</body>
</html>
