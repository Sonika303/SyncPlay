<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPlay | Word Bomb</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #2ecc71;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-heavy: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle Background Animation */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 80%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            background: var(--glass);
            padding: 40px;
            border-radius: 32px;
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 4px solid white;
            transition: all 0.3s ease;
        }

        h1 { margin-bottom: 10px; letter-spacing: -1px; font-size: 2.8rem; font-weight: 800; }
        p { opacity: 0.8; margin-bottom: 30px; font-size: 0.95rem; }

        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 16px; color: #666; }

        input {
            padding: 16px 16px 16px 45px;
            border-radius: 16px;
            border: none;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.9);
            font-size: 16px;
            font-weight: 600;
            color: #333;
            transition: all 0.3s ease;
        }

        input:focus { outline: none; background: white; box-shadow: 0 0 0 4px rgba(255,255,255,0.3); }

        button {
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            margin: 8px 0;
            cursor: pointer;
            font-weight: 800;
            width: 100%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.97); }

        .btn-google { background: white; color: var(--secondary); }
        .btn-join { background: var(--accent); color: white; }
        .btn-host { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .btn-settings { 
            position: absolute; top: 20px; right: 20px; width: 45px; height: 45px; 
            background: var(--glass); border-radius: 12px; padding: 0; color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Settings Modal */
        #settings {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .settings-content {
            background: white; color: #333; padding: 35px; border-radius: 30px;
            width: 340px; text-align: center; animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .color-picker {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin: 20px 0;
        }

        .color-opt {
            width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s;
        }

        .color-opt.active { border-color: #333; transform: scale(1.1); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        .preview-label { font-size: 12px; font-weight: 800; text-transform: uppercase; color: #999; margin-bottom: 10px; display: block;}

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button id="setBtn" class="btn-settings" onclick="toggleSettings()" style="display:none"><i data-lucide="settings"></i></button>
    
    <h1>🎬 SyncPlay</h1>

    <div id="login">
        <p>Challenge your friends in Word Bomb!</p>
        <button class="btn-google" onclick="googleLogin()"><i data-lucide="log-in"></i> Sign in with Google</button>
    </div>

    <div id="mainUI" style="display:none">
        <div id="avatarCircle" class="avatar">?</div>
        <h2 id="welcome" style="margin-top:0">Welcome</h2>
        
        <div class="input-group">
            <i data-lucide="hash"></i>
            <input id="partyCode" type="text" maxlength="4" placeholder="Enter 4-Digit Code">
        </div>
        <button class="btn-join" onclick="joinParty()"><i data-lucide="play"></i> Join Party</button>
        <button class="btn-host" onclick="createParty()"><i data-lucide="plus-circle"></i> Host a Game</button>
    </div>

    <div id="partyScreen" class="hidden">
        <h2 id="partyTitle">Lobby</h2>
        <p>Waiting for the host to ignite the bomb...</p>
        <div style="margin: 20px auto;" class="avatar" id="lobbyAvatar">?</div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
            <span style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></span>
            <p id="lobbyStatus" style="margin: 0; font-size: 14px; font-weight: 600;">Connected & Ready</p>
        </div>
    </div>
</div>

<div id="settings">
    <div class="settings-content">
        <h3 style="margin-top:0">Profile Settings</h3>
        
        <span class="preview-label">Live Preview</span>
        <div id="previewAvatar" class="avatar" style="color: white; margin-bottom: 25px;">?</div>

        <div class="input-group">
            <i data-lucide="user"></i>
            <input id="usernameInput" type="text" placeholder="Username" oninput="updatePreview()">
        </div>

        <span class="preview-label" style="margin-top:20px">Choose Avatar Color</span>
        <div class="color-picker" id="colorPicker"></div>

        <button class="btn-join" onclick="saveSettings()">Save Changes</button>
        <button style="background:#f1f1f1; color:#333" onclick="toggleSettings()">Cancel</button>
        <hr style="margin: 20px 0; opacity: 0.1;">
        <button style="background:var(--danger); color:white" onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update, onDisconnect, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser;
    let selectedColor = "#ff5e62"; 
    // BRO - I added 10 professional colors here
    const profileColors = [
        "#ff5e62", "#ff9966", "#f1c40f", "#2ecc71", "#1abc9c", 
        "#3498db", "#9b59b6", "#34495e", "#e67e22", "#eb4d4b"
    ];

    lucide.createIcons();

    const cp = document.getElementById("colorPicker");
    profileColors.forEach(color => {
        let div = document.createElement("div");
        div.className = "color-opt";
        div.style.background = color;
        div.onclick = () => selectColor(color, div);
        cp.appendChild(div);
    });

    function selectColor(color, element) {
        selectedColor = color;
        document.querySelectorAll(".color-opt").forEach(el => el.classList.remove("active"));
        if(element) element.classList.add("active");
        updatePreview();
    }

    // Live Preview Logic
    window.updatePreview = () => {
        const name = document.getElementById("usernameInput").value || "?";
        const preview = document.getElementById("previewAvatar");
        preview.innerText = name.charAt(0).toUpperCase();
        preview.style.background = selectedColor;
    };

    window.googleLogin = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("login").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
            document.getElementById("setBtn").style.display = "block";

            const userRef = ref(db, "users/" + user.uid);
            const snap = await get(userRef);
            
            let username = user.displayName ? user.displayName.split(' ')[0] : "Player";
            let color = selectedColor;

            if (snap.exists()) {
                username = snap.val().username || username;
                color = snap.val().profileColor || color;
            }

            selectedColor = color;
            await update(userRef, { username, email: user.email, profileColor: color, lastLogin: serverTimestamp() });
            updateUI(username, color);
            
            // Auto-select active color in picker
            const opts = document.querySelectorAll('.color-opt');
            opts.forEach(opt => {
                if(opt.style.backgroundColor === color || opt.style.background === color) opt.classList.add('active');
            });
        }
    });

    function updateUI(name, color) {
        const initials = name.charAt(0).toUpperCase();
        const avatars = [document.getElementById("avatarCircle"), document.getElementById("lobbyAvatar"), document.getElementById("previewAvatar")];
        avatars.forEach(av => {
            if(av) { av.innerText = initials; av.style.background = color; }
        });
        document.getElementById("welcome").innerText = "Hey, " + name;
        document.getElementById("usernameInput").value = name;
    }

    window.joinParty = async () => {
        const code = document.getElementById("partyCode").value.trim();
        if (!code) return;

        const partyRef = ref(db, "parties/" + code);
        const snap = await get(partyRef);

        if (snap.exists()) {
            const playerRef = ref(db, `parties/${code}/players/${currentUser.uid}`);
            await set(playerRef, { name: document.getElementById("usernameInput").value, color: selectedColor, joinedAt: serverTimestamp() });

            onDisconnect(playerRef).remove();

            // Kick Listener
            onValue(ref(db, `parties/${code}/kicked/${currentUser.uid}`), (kSnap) => {
                if (kSnap.exists() && kSnap.val() === true) {
                    remove(ref(db, `parties/${code}/kicked/${currentUser.uid}`));
                    alert("You have been kicked from the lobby.");
                    location.reload();
                }
            });

            document.getElementById("mainUI").style.display = "none";
            document.getElementById("setBtn").style.display = "none";
            document.getElementById("partyScreen").classList.remove("hidden");
            document.getElementById("partyTitle").innerText = "Room: " + code;

            onValue(ref(db, `parties/${code}/gameData`), (gSnap) => {
                if (gSnap.exists() && gSnap.val().status === "playing") {
                    window.location.href = `Games/Word%20Bomb/controller.html?code=${code}`;
                }
            });
        } else { alert("Room not found!"); }
    };

    window.saveSettings = async () => {
        const name = document.getElementById("usernameInput").value;
        if (!name) return;
        await update(ref(db, "users/" + currentUser.uid), { username: name, profileColor: selectedColor });
        updateUI(name, selectedColor);
        toggleSettings();
    };

    window.toggleSettings = () => {
        const s = document.getElementById("settings");
        s.style.display = (s.style.display === "flex") ? "none" : "flex";
        updatePreview();
    };

    window.logout = () => signOut(auth).then(() => location.reload());
    window.createParty = () => window.location.href = "host.html";

</script>
</body>
</html>
