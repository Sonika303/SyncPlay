<!DOCTYPE html>
<html>
<head>
<title>SyncPlay Lobby</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
margin:0;
color:white;
}

.container{
margin-top:100px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:white;
color:#333;
font-weight:bold;
cursor:pointer;
margin:8px;
}

input{
padding:10px;
border-radius:6px;
border:none;
margin:5px;
}

#settings{
background:white;
color:black;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🎬 SyncPlay Party</h1>

<div id="loginBox">
<button onclick="googleLogin()">Sign in with Google</button>
</div>

<div id="mainUI" style="display:none">

<h2 id="welcome"></h2>

<button onclick="toggleSettings()">⚙ Settings</button>

<br><br>

<input id="partyCode" placeholder="Enter Party Code">

<button onclick="joinParty()">Join Party</button>

<br><br>

<button onclick="createParty()">Create Party</button>

</div>

</div>

<div id="settings">

<h3>Account Settings</h3>

<p id="email"></p>

<input id="usernameInput" placeholder="Enter username">

<br><br>

<button onclick="saveUsername()">Save Username</button>

<br><br>

<button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
authDomain: "syncplay-17b6e.firebaseapp.com",
databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
projectId: "syncplay-17b6e",
storageBucket: "syncplay-17b6e.firebasestorage.app",
messagingSenderId: "86016195929",
appId: "1:86016195929:web:40262a28786f2ead712048"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser;

function googleLogin(){
signInWithPopup(auth,provider);
}

onAuthStateChanged(auth, async (user)=>{

if(user){

currentUser=user;

document.getElementById("loginBox").style.display="none";
document.getElementById("mainUI").style.display="block";

document.getElementById("welcome").innerText="Welcome "+user.displayName;

document.getElementById("email").innerText=user.email;

let snap=await get(ref(db,"users/"+user.uid+"/username"));

if(snap.exists()){
document.getElementById("usernameInput").value=snap.val();
}

}

});

function toggleSettings(){

let s=document.getElementById("settings");

s.style.display = s.style.display==="none"?"block":"none";

}

function saveUsername(){

let name=document.getElementById("usernameInput").value;

set(ref(db,"users/"+currentUser.uid+"/username"),name);

alert("Username saved!");

}

function logout(){

signOut(auth);
location.reload();

}

function createParty(){

window.location.href="host.html";

}

async function joinParty(){

let code=document.getElementById("partyCode").value;

let snap=await get(ref(db,"parties/"+code));

if(snap.exists()){

let userSnap=await get(ref(db,"users/"+currentUser.uid+"/username"));

let username=userSnap.exists()?userSnap.val():currentUser.displayName;

await set(ref(db,"parties/"+code+"/players/"+currentUser.uid),{
name:username
});

alert("Joined Party!");

}else{

alert("Party not found");

}

}

window.googleLogin=googleLogin;
window.toggleSettings=toggleSettings;
window.saveUsername=saveUsername;
window.logout=logout;
window.createParty=createParty;
window.joinParty=joinParty;

</script>

</body>
</html>
