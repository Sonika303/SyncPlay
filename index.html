<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncPlay | Word Bomb</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #2ecc71;
            --danger: #ff4757;
            --glass: rgba(255, 255, 255, 0.12);
        }

        /* Optimization: GPU acceleration for smoother rendering */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            margin: 0;
            /* Static gradient is much faster than animated ones */
            background: radial-gradient(circle at top left, var(--primary), var(--secondary));
            background-attachment: fixed;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            padding: 35px;
            border-radius: 28px;
            /* Lower blur = Higher FPS */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            width: 90%;
            max-width: 380px;
            text-align: center;
            will-change: transform, opacity;
            animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            border: 4px solid white;
            transition: background 0.3s ease;
        }

        h1 { margin: 0 0 5px 0; letter-spacing: -1px; font-size: 2.4rem; font-weight: 800; }
        p { opacity: 0.8; margin-bottom: 25px; font-size: 0.9rem; }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 15px; top: 14px; color: #555; pointer-events: none; }

        input {
            padding: 14px 14px 14px 45px;
            border-radius: 14px;
            border: none;
            width: 100%;
            background: rgba(255,255,255,0.95);
            font-size: 16px;
            font-weight: 600;
            color: #111;
            outline: none;
        }

        button {
            padding: 15px 20px;
            border: none;
            border-radius: 14px;
            margin: 6px 0;
            cursor: pointer;
            font-weight: 800;
            width: 100%;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        button:active { transform: scale(0.96); opacity: 0.9; }

        .btn-google { background: white; color: var(--secondary); }
        .btn-join { background: var(--accent); color: white; }
        .btn-host { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
        
        .btn-settings { 
            position: absolute; top: 15px; right: 15px; width: 42px; height: 42px; 
            background: var(--glass); border-radius: 12px; color: white; padding: 0;
        }

        /* Settings Modal Optimization */
        #settings {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .settings-content {
            background: white; color: #111; padding: 30px; border-radius: 24px;
            width: 90%; max-width: 340px; text-align: center;
        }

        .color-picker {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0;
        }

        .color-opt {
            width: 100%; aspect-ratio: 1; border-radius: 10px; cursor: pointer;
            border: 3px solid transparent;
        }

        .color-opt.active { border-color: #111; transform: scale(1.05); }

        .preview-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #888; margin-bottom: 8px; display: block;}

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button id="setBtn" class="btn-settings" onclick="toggleSettings()" style="display:none"><i data-lucide="settings" size="20"></i></button>
    
    <h1>🎬 SyncPlay</h1>

    <div id="login">
        <p>Challenge your friends in Word Bomb!</p>
        <button class="btn-google" onclick="googleLogin()"><i data-lucide="log-in" size="18"></i> Google Sign In</button>
    </div>

    <div id="mainUI" style="display:none">
        <div id="avatarCircle" class="avatar">?</div>
        <h2 id="welcome" style="margin-top:0; font-size: 1.5rem;">Hey there!</h2>
        
        <div class="input-group">
            <i data-lucide="hash" size="18"></i>
            <input id="partyCode" type="text" maxlength="4" placeholder="4-Digit Room Code">
        </div>
        <button class="btn-join" onclick="joinParty()"><i data-lucide="play" size="18"></i> Join Party</button>
        <button class="btn-host" onclick="createParty()"><i data-lucide="plus" size="18"></i> Host Game</button>
    </div>

    <div id="partyScreen" class="hidden">
        <h2 id="partyTitle">Lobby</h2>
        <p>Waiting for host...</p>
        <div style="margin: 20px auto;" class="avatar" id="lobbyAvatar">?</div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
            <span style="width: 8px; height: 8px; background: var(--accent); border-radius: 50%;"></span>
            <p id="lobbyStatus" style="margin: 0; font-size: 14px; font-weight: 600;">Ready to Play</p>
        </div>
    </div>
</div>

<div id="settings">
    <div class="settings-content">
        <h3 style="margin-top:0">Profile Settings</h3>
        <span class="preview-label">Live Preview</span>
        <div id="previewAvatar" class="avatar" style="color: white; margin-bottom: 20px;">?</div>

        <div class="input-group">
            <i data-lucide="user" size="18"></i>
            <input id="usernameInput" type="text" placeholder="Username" oninput="updatePreview()">
        </div>

        <span class="preview-label" style="margin-top:15px">Avatar Color</span>
        <div class="color-picker" id="colorPicker"></div>

        <button class="btn-join" onclick="saveSettings()">Save Changes</button>
        <button style="background:#eee; color:#111" onclick="toggleSettings()">Cancel</button>
        <hr style="margin: 15px 0; opacity: 0.1;">
        <button style="background:var(--danger); color:white" onclick="logout()"><i data-lucide="log-out" size="18"></i> Logout</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update, onDisconnect, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser;
    let selectedColor = "#ff5e62"; 
    const profileColors = ["#ff5e62", "#ff9966", "#f1c40f", "#2ecc71", "#1abc9c", "#3498db", "#9b59b6", "#34495e", "#e67e22", "#eb4d4b"];

    lucide.createIcons();

    const cp = document.getElementById("colorPicker");
    profileColors.forEach(color => {
        let div = document.createElement("div");
        div.className = "color-opt";
        div.style.background = color;
        div.onclick = () => selectColor(color, div);
        cp.appendChild(div);
    });

    function selectColor(color, element) {
        selectedColor = color;
        document.querySelectorAll(".color-opt").forEach(el => el.classList.remove("active"));
        if(element) element.classList.add("active");
        updatePreview();
    }

    window.updatePreview = () => {
        const name = document.getElementById("usernameInput").value || "?";
        const preview = document.getElementById("previewAvatar");
        preview.innerText = name.charAt(0).toUpperCase();
        preview.style.background = selectedColor;
    };

    window.googleLogin = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("login").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
            document.getElementById("setBtn").style.display = "block";

            const userRef = ref(db, "users/" + user.uid);
            const snap = await get(userRef);
            
            let username = user.displayName ? user.displayName.split(' ')[0] : "Player";
            let color = selectedColor;

            if (snap.exists()) {
                username = snap.val().username || username;
                color = snap.val().profileColor || color;
            }

            selectedColor = color;
            await update(userRef, { username, email: user.email, profileColor: color, lastLogin: serverTimestamp() });
            updateUI(username, color);
            
            document.querySelectorAll('.color-opt').forEach(opt => {
                if(opt.style.backgroundColor === color) opt.classList.add('active');
            });
        }
    });

    function updateUI(name, color) {
        const initials = name.charAt(0).toUpperCase();
        const targets = ["avatarCircle", "lobbyAvatar", "previewAvatar"];
        targets.forEach(id => {
            const el = document.getElementById(id);
            if(el) { el.innerText = initials; el.style.background = color; }
        });
        document.getElementById("welcome").innerText = "Hey, " + name;
        document.getElementById("usernameInput").value = name;
    }

    window.joinParty = async () => {
        const code = document.getElementById("partyCode").value.trim();
        if (!code) return;

        const partyRef = ref(db, "parties/" + code);
        const snap = await get(partyRef);

        if (snap.exists()) {
            const playerRef = ref(db, `parties/${code}/players/${currentUser.uid}`);
            await set(playerRef, { 
                name: document.getElementById("usernameInput").value, 
                color: selectedColor, 
                joinedAt: serverTimestamp() 
            });

            onDisconnect(playerRef).remove();

            document.getElementById("mainUI").style.display = "none";
            document.getElementById("setBtn").style.display = "none";
            document.getElementById("partyScreen").classList.remove("hidden");
            document.getElementById("partyTitle").innerText = "Room: " + code;

            onValue(ref(db, `parties/${code}/gameData`), (gSnap) => {
                if (gSnap.exists() && gSnap.val().status === "playing") {
                    window.location.href = `Games/Word%20Bomb/controller.html?code=${code}`;
                }
            });
        } else { alert("Room not found!"); }
    };

    window.saveSettings = async () => {
        const name = document.getElementById("usernameInput").value;
        if (!name) return;
        await update(ref(db, "users/" + currentUser.uid), { username: name, profileColor: selectedColor });
        updateUI(name, selectedColor);
        toggleSettings();
    };

    window.toggleSettings = () => {
        const s = document.getElementById("settings");
        s.style.display = (s.style.display === "flex") ? "none" : "flex";
        updatePreview();
    };

    window.logout = () => signOut(auth).then(() => location.reload());
    window.createParty = () => window.location.href = "host.html";
</script>
</body>
</html>
