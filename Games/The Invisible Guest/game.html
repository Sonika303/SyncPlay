<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Invisible Guest: Ghost vs Buster</title>
    <style>
        body { background: #020205; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; height: 100vh; justify-content: center; }
        #game-container { position: relative; border: 4px solid #1a1a2e; box-shadow: 0 0 100px #000; }
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; pointer-events: none; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .bar-outer { width: 200px; height: 12px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 6px; overflow: hidden; }
        #fear-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #900, #f33); transition: width 0.3s; }
        #energy-fill { width: 100%; height: 100%; background: #0ff; box-shadow: 0 0 10px #0ff; }
        #floor-indicator { position: absolute; bottom: 20px; left: 20px; font-size: 20px; color: #ff0; font-weight: bold; }
        #object-counter { position: absolute; bottom: 20px; right: 20px; font-size: 14px; color: #888; }
        .label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #aaa; }
        #alert { position: absolute; top: 50%; width: 100%; text-align: center; color: #f00; font-size: 30px; font-weight: bold; opacity: 0; transition: 0.2s; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div class="stats-row">
                <div>
                    <div class="label">Mansion Terror</div>
                    <div class="bar-outer"><div id="fear-fill"></div></div>
                </div>
                <div>
                    <div class="label">Ecto-Energy</div>
                    <div class="bar-outer"><div id="energy-fill"></div></div>
                </div>
            </div>
        </div>
        <div id="alert">OBJECT EXORCISM IN PROGRESS!</div>
        <div id="floor-indicator">FLOOR 1</div>
        <div id="object-counter">HAUNTED: 0 / 15</div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <script src="game.js"></script>
</body>
</html>
