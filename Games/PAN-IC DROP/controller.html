<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Controller | SyncPlay</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');

        body {
            margin: 0; padding: 0; height: 100vh;
            background: #1a1a1a; color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden; touch-action: none;
            user-select: none;
        }

        #status-container {
            position: absolute; top: 30px;
            text-align: center;
        }

        #status {
            font-size: 12px; color: #6c5ce7;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #chef-name {
            font-size: 24px; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #dashBtn {
            position: absolute; bottom: 50px; right: 30px;
            width: 100px; height: 100px;
            background: #ff7675; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 0 #d63031;
            transition: transform 0.05s, box-shadow 0.05s;
            cursor: pointer;
            z-index: 10;
        }

        #dashBtn:active { 
            transform: translateY(4px); 
            box-shadow: 0 4px 0 #d63031; 
            background: #ff4757; 
        }

        #joystickContainer {
            width: 240px; height: 240px;
            background: rgba(255,255,255,0.03);
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            touch-action: none;
        }

        #joystickKnob {
            width: 90px; height: 90px;
            background: #6c5ce7; border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.4);
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        .instruction {
            margin-top: 40px; color: #636e72;
            font-size: 11px; text-align: center;
            line-height: 1.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="status-container">
        <div id="status">INITIALIZING...</div>
        <div id="chef-name">CHEF ???</div>
    </div>

    <div id="joystickContainer">
        <div id="joystickKnob"></div>
    </div>

    <div id="dashBtn">
        <i data-lucide="zap" color="white" size="45"></i>
    </div>

    <div class="instruction">DRAG JOYSTICK TO MOVE<br>SMASH BUTTON TO DASH</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onDisconnect, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
        authDomain: "syncplay-17b6e.firebaseapp.com",
        databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
        projectId: "syncplay-17b6e",
        storageBucket: "syncplay-17b6e.firebasestorage.app",
        messagingSenderId: "86016195929",
        appId: "1:86016195929:web:40262a28786f2ead712048"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const partyCode = urlParams.get('code');
    const statusEl = document.getElementById('status');
    const nameEl = document.getElementById('chef-name');
    
    let userId = localStorage.getItem('syncplay_chef_id');
    if (!userId) {
        userId = 'chef_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('syncplay_chef_id', userId);
    }

    const myName = "CHEF " + userId.split('_')[1].toUpperCase();
    nameEl.innerText = myName;

    // --- CONNECTION ---
    if (partyCode) {
        statusEl.innerText = "CONNECTED TO " + partyCode;
        const playerRef = ref(db, `parties/${partyCode}/players/${userId}`);
        
        set(playerRef, {
            name: myName,
            inputs: { x: 0, y: 0, dash: false }
        });

        onDisconnect(playerRef).remove();
    } else {
        statusEl.innerText = "ERROR: NO CODE";
    }

    // --- INPUT SENDING ---
    let currentX = 0;
    let currentY = 0;
    let isDashing = false;

    const sendInputs = () => {
        if (!partyCode) return;
        update(ref(db, `parties/${partyCode}/players/${userId}/inputs`), {
            x: Number(currentX.toFixed(2)),
            y: Number(currentY.toFixed(2)),
            dash: isDashing
        });
    };

    // Heartbeat loop for smooth movement (30fps)
    setInterval(sendInputs, 33);

    // --- JOYSTICK LOGIC ---
    const knob = document.getElementById('joystickKnob');
    const container = document.getElementById('joystickContainer');
    let dragging = false;

    const moveJoystick = (e) => {
        if (!dragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const dx = clientX - centerX;
        const dy = clientY - centerY;
        
        const maxRadius = 80;
        const distance = Math.min(Math.hypot(dx, dy), maxRadius);
        const angle = Math.atan2(dy, dx);
        
        const visualX = Math.cos(angle) * distance;
        const visualY = Math.sin(angle) * distance;
        
        knob.style.transform = `translate(${visualX}px, ${visualY}px)`;
        
        // Update values for the interval loop
        currentX = visualX / maxRadius;
        currentY = visualY / maxRadius;
    };

    container.addEventListener('touchstart', (e) => { dragging = true; moveJoystick(e); });
    container.addEventListener('mousedown', (e) => { dragging = true; moveJoystick(e); });
    
    window.addEventListener('touchmove', moveJoystick, { passive: false });
    window.addEventListener('mousemove', moveJoystick);
    
    const resetJoystick = () => {
        dragging = false;
        knob.style.transform = `translate(0px, 0px)`;
        currentX = 0;
        currentY = 0;
    };

    window.addEventListener('touchend', resetJoystick);
    window.addEventListener('mouseup', resetJoystick);

    // --- DASH BUTTON ---
    const dashBtn = document.getElementById('dashBtn');
    dashBtn.addEventListener('touchstart', (e) => {
        isDashing = true;
        setTimeout(() => { isDashing = false; }, 100);
    });
    dashBtn.addEventListener('mousedown', (e) => {
        isDashing = true;
        setTimeout(() => { isDashing = false; }, 100);
    });

    lucide.createIcons();
</script>
</body>
</html>
