<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Bomb - Arena</title>
    <style>
        :root {
            --danger: #ff4757;
            --accent: #f1c40f;
            --success: #2ecc71;
            --primary: #6c5ce7;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, #1e272e 0%, #000000 100%);
            color: white;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
            box-sizing: border-box;
        }

        #partyId {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 4px;
            font-weight: bold;
        }

        .main-arena {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #bomb {
            font-size: 100px;
            margin: 0;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
            line-height: 1;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #timer {
            font-size: 80px;
            font-weight: 900;
            color: var(--danger);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
            margin: 10px 0;
        }

        #syllable-box {
            background: var(--accent);
            color: black;
            padding: 10px 40px;
            font-size: 45px;
            font-weight: 900;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.3);
            text-transform: uppercase;
            min-width: 180px;
        }

        #word-display {
            font-size: 35px;
            font-weight: bold;
            color: white;
            margin-top: 20px;
            text-transform: uppercase;
            min-height: 50px;
            letter-spacing: 2px;
        }

        #lives-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            min-width: 110px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
        }

        .active-turn {
            border-color: var(--accent);
            background: rgba(241, 196, 15, 0.15);
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
        }

        .dead { opacity: 0.3; filter: grayscale(1); transform: scale(0.9); }

        .mini-avatar {
            width: 40px; height: 40px; border-radius: 12px;
            margin: 0 auto 8px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; border: 2px solid white;
            color: white;
        }

        .player-name { font-size: 14px; font-weight: 800; margin-bottom: 5px; }
        .heart-container { color: var(--danger); font-size: 12px; }

        #victory-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(15px);
        }

        .vic-btn { padding: 15px 30px; border-radius: 15px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; margin: 10px; transition: 0.2s; }
        .btn-again { background: var(--success); color: white; }
        .btn-lobby { background: var(--primary); color: white; }

        /* Animations */
        .shake-slow { animation: shake 0.5s infinite; }
        .shake-fast { animation: shake 0.15s infinite; }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }
    </style>
</head>
<body>

    <h2 id="partyId">ROOM: ----</h2>

    <div class="main-arena">
        <div id="bomb" class="shake-slow">💣</div>
        <div id="timer">15</div>

        <p style="color: #888; margin: 0; font-weight: 800; font-size: 12px; letter-spacing: 1px;">MUST CONTAIN:</p>
        <div id="syllable-box">
            <span id="syllable">WAIT</span>
        </div>

        <div id="word-display"></div> 
        
        <div id="turn-info" style="margin-top:15px; font-weight:bold; color:var(--accent); text-transform: uppercase; letter-spacing: 1px;">CONNECTING...</div>
    </div>

    <div id="lives-display"></div>

    <div id="victory-overlay">
        <h1 id="winner-text" style="font-size: 3rem; margin-bottom: 0;">WINNER!</h1>
        <div id="host-controls" style="display: none; gap: 10px; margin-top: 20px;">
            <button class="vic-btn btn-again" id="btn-reset">PLAY AGAIN</button>
            <button class="vic-btn btn-lobby" id="btn-lobby">BACK TO LOBBY</button>
        </div>
        <p id="player-msg" style="color: #888; font-weight: bold;">Waiting for host to decide...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
