<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Bomb - Main Screen</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            color: white;
            text-align: center;
            overflow: hidden;
            height: 100vh;
        }

        .game-container {
            margin-top: 40px;
        }

        #partyId {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        /* The Shaking Bomb */
        #bomb {
            font-size: 140px;
            margin: 10px;
            display: inline-block;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        .shake-slow { animation: shake 0.5s infinite; }
        .shake-fast { animation: shake 0.1s infinite; color: #ff4757; }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(-1deg); }
            80% { transform: translate(3px, 1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        #timer {
            font-size: 80px;
            font-weight: bold;
            color: #ff4757;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
            margin-top: -20px;
        }

        #syllable-box {
            background: #f1c40f;
            color: black;
            padding: 15px 50px;
            font-size: 50px;
            font-weight: 900;
            display: inline-block;
            border-radius: 20px;
            margin: 20px;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.6);
            min-width: 180px;
            text-transform: uppercase;
        }

        #turn-info {
            margin-top: 10px;
            font-size: 36px;
            font-weight: bold;
            height: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Player Card Section */
        #lives-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
            padding: 0 50px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            min-width: 160px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mini-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
            margin-bottom: 10px;
            border: 2px solid white;
        }

        .active-turn {
            border-color: #f1c40f;
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.15);
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.3);
        }

        .dead {
            opacity: 0.2;
            filter: grayscale(1) blur(1px);
        }

        .player-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .hearts {
            color: #ff4757;
            font-size: 24px;
            filter: drop-shadow(0 0 5px rgba(255, 71, 87, 0.5));
        }

        /* Host Reset Button Styling */
        #resetBtn {
            display: none; 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #2ecc71; 
            color: white; 
            padding: 15px 40px; 
            border-radius: 15px; 
            font-size: 24px;
            font-weight: 900; 
            border: none; 
            cursor: pointer;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
            z-index: 100;
        }

        #resetBtn:hover { background: #27ae60; transform: translateX(-50%) scale(1.05); }

    </style>
</head>
<body>

    <div class="game-container">
        <h2 id="partyId">CONNECTING...</h2>

        <div id="bomb" class="shake-slow">💣</div>
        <div id="timer">--</div>

        <p style="font-size: 18px; color: #bdc3c7; margin-bottom: 5px;">Type a word containing:</p>
        <div id="syllable-box">
            <span id="syllable">WAITING</span>
        </div>

        <div id="turn-info">Loading Game...</div>

        <div id="lives-display"></div>
    </div>

    <button id="resetBtn" onclick="resetGame()">PLAY AGAIN</button>

    <audio id="snd-tick" src="https://cdn.pixabay.com/audio/2022/03/15/audio_784d94314d.mp3"></audio>
    <audio id="snd-boom" src="https://cdn.pixabay.com/audio/2021/08/04/audio_bbdec30935.mp3"></audio>
    <audio id="snd-win" src="https://cdn.pixabay.com/audio/2021/08/04/audio_12b93806f1.mp3"></audio>
    <audio id="snd-correct" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c33ca44122.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script type="module" src="game.js"></script>

    <script>
        const timerObs = document.getElementById('timer');
        const bombObs = document.getElementById('bomb');

        const observer = new MutationObserver(() => {
            const val = timerObs.innerText;
            const timeLeft = parseInt(val);
            
            // Bomb shaking logic
            if (val === "🏆") {
                bombObs.className = "";
                bombObs.innerText = "👑"; // Change bomb to crown on win
                // Trigger Confetti
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            } else if (!isNaN(timeLeft)) {
                bombObs.innerText = "💣";
                if (timeLeft <= 5) {
                    bombObs.className = "shake-fast";
                } else {
                    bombObs.className = "shake-slow";
                }
            } else {
                bombObs.className = "shake-slow";
            }
        });

        observer.observe(timerObs, { childList: true });
    </script>

</body>
</html>
