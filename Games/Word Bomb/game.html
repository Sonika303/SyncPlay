<!DOCTYPE html>
<html>
<head>
    <title>Word Bomb - Main Screen</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: radial-gradient(circle, #2c3e50, #000000);
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .game-container {
            margin-top: 50px;
        }

        #bomb {
            font-size: 120px;
            margin: 20px;
            display: inline-block;
        }

        #timer {
            font-size: 60px;
            font-weight: bold;
            color: #ff4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }

        #syllable-box {
            background: #f1c40f;
            color: black;
            padding: 20px 40px;
            font-size: 40px;
            font-weight: bold;
            display: inline-block;
            border-radius: 15px;
            margin: 20px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.4);
            min-width: 150px;
        }

        #turn-info {
            margin-top: 10px;
            font-size: 32px;
            font-weight: bold;
            color: #2ecc71;
            height: 40px;
        }

        /* Lives Display Section */
        #lives-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 50px;
            flex-wrap: wrap;
            padding: 20px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            min-width: 140px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        /* Highlight the card of the player whose turn it is */
        .active-turn {
            border-color: #f1c40f;
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
        }

        .dead {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .player-name {
            font-size: 18px;
            display: block;
            margin-bottom: 5px;
        }

        .hearts {
            color: #ff4757;
            font-size: 22px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h2 id="partyId">Party: ----</h2>

        <div id="bomb">💣</div>
        <div id="timer">10</div>

        <p style="font-size: 20px; color: #bdc3c7;">Use your phone to type a word containing:</p>
        <div id="syllable-box"><span id="syllable">Choosing...</span></div>

        <div id="turn-info">Waiting for players...</div>

        <div id="lives-display"></div>
    </div>

    <script type="module" src="game.js"></script>

</body>
</html>
