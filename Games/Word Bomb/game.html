<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Bomb - Arena</title>
    <style>
        :root {
            --danger: #ff4757;
            --accent: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, #1e272e 0%, #000000 100%);
            color: white;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Scales UI to fit screen */
            padding: 20px 0;
            box-sizing: border-box;
        }

        #partyId {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 4px;
            font-weight: bold;
        }

        /* --- Center Game Area --- */
        .main-arena {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #bomb {
            font-size: 120px;
            margin: 0;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
            line-height: 1;
        }

        #timer {
            font-size: 100px;
            font-weight: 900;
            color: var(--danger);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
            margin: -10px 0 10px 0;
        }

        #syllable-box {
            background: var(--accent);
            color: black;
            padding: 10px 60px;
            font-size: 60px;
            font-weight: 900;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.4);
            text-transform: uppercase;
            min-width: 200px;
        }

        /* --- NEW: Word Display --- */
        #word-display {
            height: 60px;
            font-size: 40px;
            font-weight: bold;
            color: white;
            margin-top: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        #turn-info {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* --- Player Cards --- */
        #lives-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
            max-height: 30vh;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            min-width: 140px;
            border: 3px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .active-turn {
            border-color: var(--accent);
            background: rgba(241, 196, 15, 0.1);
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 15px 40px rgba(241, 196, 15, 0.2);
        }

        .mini-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            margin-bottom: 8px;
        }

        .player-name { font-weight: bold; font-size: 18px; }
        .hearts { font-size: 22px; margin-top: 5px; }
        .dead { opacity: 0.3; filter: grayscale(1); }

        /* Animations */
        .shake-slow { animation: shake 0.5s infinite; }
        .shake-fast { animation: shake 0.15s infinite; color: var(--danger); }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg) translate(-2px, 0); }
            75% { transform: rotate(2deg) translate(2px, 0); }
            100% { transform: rotate(0deg); }
        }

        #resetBtn {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2ecc71;
            padding: 20px 50px;
            border-radius: 20px;
            font-size: 30px;
            font-weight: 900;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.6);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h2 id="partyId">SYNCING...</h2>

    <div class="main-arena">
        <div id="bomb" class="shake-slow">💣</div>
        <div id="timer">--</div>

        <p style="color: #888; margin: 0;">SYLLABLE:</p>
        <div id="syllable-box">
            <span id="syllable">WAITING</span>
        </div>

        <div id="word-display"></div> <div id="turn-info">WAITING FOR PLAYERS...</div>
    </div>

    <div id="lives-display"></div>

    <button id="resetBtn" onclick="resetGame()">PLAY AGAIN</button>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module" src="game.js"></script>

    <script>
        const timerObs = document.getElementById('timer');
        const bombObs = document.getElementById('bomb');

        const observer = new MutationObserver(() => {
            const timeLeft = parseInt(timerObs.innerText);
            if (timerObs.innerText === "GAME OVER") {
                bombObs.innerText = "💥";
                bombObs.className = "";
            } else if (!isNaN(timeLeft)) {
                bombObs.innerText = "💣";
                bombObs.className = timeLeft <= 5 ? "shake-fast" : "shake-slow";
            }
        });

        observer.observe(timerObs, { childList: true });
    </script>
</body>
</html>
