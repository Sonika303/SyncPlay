<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Bomb - Arena</title>
    <style>
        :root {
            --danger: #ff4757;
            --accent: #f1c40f;
            --success: #2ecc71;
            --primary: #6c5ce7;
            --bg: #1e272e;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, #1e272e 0%, #000000 100%);
            color: white;
            text-align: center;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
            box-sizing: border-box;
        }

        #partyId {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 4px;
            font-weight: bold;
            margin-top: 10px;
        }

        .main-arena {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #bomb {
            font-size: 120px;
            margin: 0;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
            line-height: 1;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #timer {
            font-size: 90px;
            font-weight: 900;
            color: var(--danger);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 30px rgba(255, 71, 87, 0.6);
            margin: -10px 0 10px 0;
        }

        #syllable-box {
            background: var(--accent);
            color: black;
            padding: 15px 50px;
            font-size: 50px;
            font-weight: 900;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(241, 196, 15, 0.4);
            text-transform: uppercase;
            min-width: 200px;
            margin-top: 5px;
            transform: perspective(500px) rotateX(10deg);
        }

        #word-display {
            font-size: 35px;
            font-weight: 800;
            color: white;
            margin-top: 25px;
            text-transform: uppercase;
            min-height: 60px;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #lives-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
            max-width: 90%;
            margin: 0 auto;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            min-width: 120px;
            border: 3px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ACTIVE TURN HIGHLIGHT */
        .active-turn-ui {
            border-color: var(--accent) !important;
            background: rgba(241, 196, 15, 0.2) !important;
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 15px 30px rgba(241, 196, 15, 0.3);
        }

        .dead { opacity: 0.3; filter: grayscale(1); transform: scale(0.9); }

        .mini-avatar {
            width: 50px; height: 50px; border-radius: 15px;
            margin: 0 auto 10px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; border: 3px solid white;
            font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .player-name { font-size: 16px; font-weight: 800; margin-bottom: 5px; }

        /* VICTORY OVERLAY STUFF */
        #victory-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(15px);
        }

        .winner-card { text-align: center; animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .crown-icon {
            font-size: 80px; margin-bottom: -30px; position: relative; z-index: 2;
            animation: crownFloat 2s ease-in-out infinite;
        }

        .winner-avatar-spin {
            width: 160px; height: 160px; border-radius: 50px; border: 10px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; color: white; font-weight: 900; margin: 0 auto;
            box-shadow: 0 0 60px rgba(255,255,255,0.2);
            animation: avatarSpin 6s linear infinite;
        }

        .vic-btn { padding: 18px 35px; border-radius: 20px; font-size: 20px; font-weight: 900; border: none; cursor: pointer; margin: 10px; transition: 0.3s; text-transform: uppercase; }
        .btn-again { background: var(--success); color: white; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }
        .btn-lobby { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); }
        .vic-btn:hover { transform: translateY(-5px) scale(1.05); }

        /* KEYFRAMES */
        @keyframes avatarSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes crownFloat { 0%, 100% { transform: translateY(0) rotate(-10deg); } 50% { transform: translateY(-25px) rotate(10deg); } }
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg) scale(1.2); } 25% { transform: rotate(-5deg) scale(1.2); } 75% { transform: rotate(5deg) scale(1.2); } }
        
        .shake-slow { animation: shake 0.5s infinite; transform: scale(1); }
        .shake-fast { animation: shake 0.1s infinite; transform: scale(1.3); }
    </style>
</head>
<body>

    <h2 id="partyId">ROOM: ----</h2>

    <div class="main-arena">
        <div id="bomb" class="shake-slow">💣</div>
        <div id="timer">15</div>

        <p style="color: rgba(255,255,255,0.5); margin: 0; font-weight: 900; font-size: 14px; letter-spacing: 2px;">MUST CONTAIN:</p>
        <div id="syllable-box">
            <span id="syllable">READY?</span>
        </div>

        <div id="word-display"></div> 
        
        <div id="turn-info" style="margin-top:20px; font-weight:900; color:var(--accent); text-transform: uppercase; letter-spacing: 2px; font-size: 20px;">
            WAITING FOR PLAYERS...
        </div>
    </div>

    <div id="lives-display"></div>

    <div id="victory-overlay">
        <div id="winner-container" class="winner-card">
            </div>
        
        <div id="host-controls" style="display: none; gap: 15px; margin-top: 40px;">
            <button class="vic-btn btn-again" id="btn-reset">PLAY AGAIN</button>
            <button class="vic-btn btn-lobby" id="btn-lobby">BACK TO LOBBY</button>
        </div>
        <p id="player-msg" style="color: #888; font-weight: bold; margin-top: 30px;">Wait for the Host to start a new round...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
