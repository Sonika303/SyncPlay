<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Controller</title>
    <style>
        body { 
            margin: 0; 
            background: #0f172a; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            color: white; 
            user-select: none;
        }

        #nameDisp { 
            position: absolute; 
            top: 40px; 
            font-weight: 900; 
            color: #6c5ce7; 
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dpad { 
            display: grid; 
            grid-template-columns: repeat(3, 95px); 
            grid-template-rows: repeat(3, 95px); 
            gap: 20px; 
        }

        .btn { 
            background: #1e293b; 
            border: 4px solid #334155; 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 32px; 
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* Using touch-action none to prevent browser zoom/delay */
        .btn { touch-action: none; }

        .btn:active { 
            background: #6c5ce7; 
            border-color: #a29bfe; 
            transform: scale(0.92); 
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.4);
        }

        .up { grid-column: 2; } 
        .left { grid-row: 2; grid-column: 1; } 
        .right { grid-row: 2; grid-column: 3; } 
        .down { grid-row: 3; grid-column: 2; }

        .hint {
            position: absolute;
            bottom: 40px;
            font-size: 12px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="nameDisp">JOINING...</div>

    <div class="dpad">
        <div class="btn up" onpointerdown="sendDir(0, -1)">▲</div>
        <div class="btn left" onpointerdown="sendDir(-1, 0)">◀</div>
        <div class="btn right" onpointerdown="sendDir(1, 0)">▶</div>
        <div class="btn down" onpointerdown="sendDir(0, 1)">▼</div>
    </div>

    <div class="hint">Tap arrows to move your snake</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
            authDomain: "syncplay-17b6e.firebaseapp.com",
            databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
            projectId: "syncplay-17b6e",
            storageBucket: "syncplay-17b6e.firebasestorage.app",
            messagingSenderId: "86016195929",
            appId: "1:86016195929:web:40262a28786f2ead712048"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const partyCode = urlParams.get('code');
        let myUid;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                onValue(ref(db, `parties/${partyCode}/players/${myUid}`), (s) => {
                    if(s.exists()) {
                        document.getElementById('nameDisp').innerText = s.val().name;
                        document.getElementById('nameDisp').style.color = s.val().color || "#6c5ce7";
                    }
                });
            }
        });

        window.sendDir = (x, y) => {
            if(!myUid || !partyCode) return;
            
            // Haptic Feedback for better feel
            if (navigator.vibrate) navigator.vibrate(10);

            update(ref(db, `parties/${partyCode}/players/${myUid}`), {
                dir: { x: x, y: y }
            });
        };
    </script>
</body>
</html>
