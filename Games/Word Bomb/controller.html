<!DOCTYPE html>
<html>
<head>
    <title>SyncPlay - Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .controller-card { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        input { width: 80%; padding: 15px; font-size: 20px; border-radius: 8px; border: none; margin-bottom: 20px; text-align: center; }
        button { width: 80%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; }
        .my-turn { color: #2ecc71; }
        .not-my-turn { color: #e74c3c; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="controller-card">
        <h3 id="playerName">Controller</h3>
        <div id="status">Waiting...</div>
        <br>
        <input type="text" id="wordInput" placeholder="Enter word" autocomplete="off" disabled>
        <br>
        <button id="sendBtn" onclick="submitWord()" disabled>SUBMIT WORD</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU", authDomain: "syncplay-17b6e.firebaseapp.com", databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com", projectId: "syncplay-17b6e", storageBucket: "syncplay-17b6e.firebasestorage.app", messagingSenderId: "86016195929", appId: "1:86016195929:web:40262a28786f2ead712048" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        let myUid;

        onAuthStateChanged(auth, (user) => {
            if (user) { 
                myUid = user.uid;
                listenForTurn();
            }
        });

        function listenForTurn() {
            onValue(ref(db, `parties/${code}/gameData`), (snap) => {
                if (!snap.exists()) return;
                const data = snap.val();
                const isMyTurn = (data.turn === myUid);
                
                const input = document.getElementById("wordInput");
                const btn = document.getElementById("sendBtn");
                const status = document.getElementById("status");

                if (isMyTurn) {
                    input.disabled = false;
                    btn.disabled = false;
                    status.innerText = "YOUR TURN!";
                    status.className = "my-turn";
                    input.focus();
                } else {
                    input.disabled = true;
                    btn.disabled = true;
                    status.innerText = "Wait for your turn...";
                    status.className = "not-my-turn";
                }
            });
        }

        window.submitWord = async () => {
            const word = document.getElementById("wordInput").value.toUpperCase();
            if(!word) return;

            // Send word to host via database
            await set(ref(db, `parties/${code}/action`), {
                uid: myUid,
                word: word,
                timestamp: Date.now()
            });
            document.getElementById("wordInput").value = "";
        };
    </script>
</body>
</html>
