<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Controller</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; color: white; }
        .dpad { display: grid; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(3, 80px); gap: 15px; }
        .btn { background: #333; border: 4px solid #444; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; touch-action: manipulation; }
        .btn:active { background: #6c5ce7; border-color: white; transform: scale(0.9); }
        .up { grid-column: 2; } .left { grid-row: 2; grid-column: 1; } .right { grid-row: 2; grid-column: 3; } .down { grid-row: 3; grid-column: 2; }
        #nameDisp { position: absolute; top: 20px; font-weight: bold; color: #6c5ce7; }
    </style>
</head>
<body>
    <div id="nameDisp">CONTROLLING SNAKE</div>
    <div class="dpad">
        <div class="btn up" onclick="sendDir(0, -1)">▲</div>
        <div class="btn left" onclick="sendDir(-1, 0)">◀</div>
        <div class="btn right" onclick="sendDir(1, 0)">▶</div>
        <div class="btn down" onclick="sendDir(0, 1)">▼</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
            authDomain: "syncplay-17b6e.firebaseapp.com",
            databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
            projectId: "syncplay-17b6e",
            storageBucket: "syncplay-17b6e.firebasestorage.app",
            messagingSenderId: "86016195929",
            appId: "1:86016195929:web:40262a28786f2ead712048"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const partyCode = urlParams.get('code');
        let myUid;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                // Get player name to display
                onValue(ref(db, `parties/${partyCode}/players/${myUid}`), (s) => {
                    if(s.exists()) document.getElementById('nameDisp').innerText = s.val().name.toUpperCase();
                });
            }
        });

        window.sendDir = (x, y) => {
            if(!myUid || !partyCode) return;
            update(ref(db, `parties/${partyCode}/players/${myUid}`), {
                dir: { x: x, y: y }
            });
        };
    </script>
</body>
</html>
