<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Controller</title>
    <style>
        body { 
            margin: 0; 
            background: #0f172a; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            color: white; 
            user-select: none;
        }

        #nameDisp { 
            position: absolute; 
            top: 40px; 
            font-weight: 900; 
            color: #6c5ce7; 
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(108, 92, 231, 0.3);
        }

        /* DPAD STYLES */
        .dpad { 
            display: grid; 
            grid-template-columns: repeat(3, 95px); 
            grid-template-rows: repeat(3, 95px); 
            gap: 20px; 
        }

        .btn { 
            background: #1e293b; 
            border: 4px solid #334155; 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 32px; 
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .btn:active, .btn.pressing { 
            background: #6c5ce7; 
            border-color: #a29bfe; 
            transform: scale(0.92); 
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.4);
        }

        .up { grid-column: 2; } 
        .left { grid-row: 2; grid-column: 1; } 
        .right { grid-row: 2; grid-column: 3; } 
        .down { grid-row: 3; grid-column: 2; }

        /* SHOP OVERLAY STYLES */
        #shop-overlay {
            position: absolute;
            inset: 0;
            background: #161b22;
            display: none; /* Controlled by Firebase */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 500;
        }

        .shop-btn {
            width: 80%;
            padding: 25px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            border: none;
            color: white;
        }

        .buy-btn { background: #10b981; border: 2px solid #34d399; }
        .close-btn { background: #ef4444; border: 2px solid #f87171; }

        .hint {
            position: absolute;
            bottom: 40px;
            font-size: 12px;
            opacity: 0.4;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="nameDisp">JOINING...</div>

    <div class="dpad" id="dpad-container">
        <div class="btn up" onpointerdown="sendDir(0, -1)">▲</div>
        <div class="btn left" onpointerdown="sendDir(-1, 0)">◀</div>
        <div class="btn right" onpointerdown="sendDir(1, 0)">▶</div>
        <div class="btn down" onpointerdown="sendDir(0, 1)">▼</div>
    </div>

    <div id="shop-overlay">
        <div style="color: #10b981; font-weight: bold; font-size: 24px; margin-bottom: 10px;">SHOP OPEN</div>
        <button class="shop-btn buy-btn" onpointerdown="buyItem()">PURCHASE FOR TEAM</button>
        <button class="shop-btn close-btn" onpointerdown="closeShop()">CLOSE SHOP</button>
    </div>

    <div class="hint" id="hint-text">Tap arrows to move your snake</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCODp3h025sM3jl7Ji0GJgVuGoWCD1wddU",
            authDomain: "syncplay-17b6e.firebaseapp.com",
            databaseURL: "https://syncplay-17b6e-default-rtdb.firebaseio.com",
            projectId: "syncplay-17b6e",
            storageBucket: "syncplay-17b6e.firebasestorage.app",
            messagingSenderId: "86016195929",
            appId: "1:86016195929:web:40262a28786f2ead712048"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        const urlParams = new URLSearchParams(window.location.search);
        const partyCode = urlParams.get('code');
        let myUid;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                
                // 1. Monitor user data (Name/Color)
                onValue(ref(db, `parties/${partyCode}/players/${myUid}`), (snapshot) => {
                    if(snapshot.exists()) {
                        const data = snapshot.val();
                        document.getElementById('nameDisp').innerText = data.name;
                        document.getElementById('nameDisp').style.color = data.color || "#6c5ce7";
                    }
                });

                // 2. Monitor Shop State from main screen
                onValue(ref(db, `parties/${partyCode}/gameState/shopOpen`), (snapshot) => {
                    const isShopOpen = snapshot.val() === true;
                    document.getElementById('shop-overlay').style.display = isShopOpen ? 'flex' : 'none';
                    document.getElementById('dpad-container').style.opacity = isShopOpen ? '0.1' : '1';
                });
            }
        });

        // DIRECTION LOGIC
        window.sendDir = (x, y) => {
            if(!myUid || !partyCode) return;
            if (navigator.vibrate) navigator.vibrate(15);
            update(ref(db, `parties/${partyCode}/players/${myUid}`), {
                dir: { x, y }
            });
        };

        // SHOP LOGIC
        window.closeShop = () => {
            if (navigator.vibrate) navigator.vibrate(30);
            update(ref(db, `parties/${partyCode}/gameState`), { shopOpen: false });
        };

        window.buyItem = () => {
            if (navigator.vibrate) navigator.vibrate(20);
            // This signals the host to run the purchase logic
            update(ref(db, `parties/${partyCode}/gameState`), { buyRequest: Date.now() });
        };

        window.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); return false; };
    </script>
</body>
</html>
