<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SNAKE!</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010409; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: white; }
        .stats-card { position: absolute; top: 20px; left: 20px; background: rgba(13, 17, 23, 0.85); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); }
        .biome-header { position: absolute; top: 20px; right: 20px; text-align: right; }
        .biome-name { font-size: 32px; font-weight: 900; color: #10b981; margin: 0; text-shadow: 0 0 20px rgba(16,185,129,0.4); }
        .shop-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; place-items: center; pointer-events: all; z-index: 1000; backdrop-filter: blur(10px); color: white; }
        .shop-card { background: #161b22; padding: 40px; border-radius: 30px; border: 2px solid #10b981; text-align: center; }
        .shop-btn { padding: 15px 30px; background: #10b981; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .shop-btn:disabled { background: #334155; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="stats-card">
            <div style="font-size: 14px; opacity: 0.6; margin-bottom: 5px;">PARTY TOTAL</div>
            <div style="font-size: 26px;">🍎 <span id="s-norm">0</span> | <span style="color:#fbbf24">⭐ <span id="s-gold">0</span></span></div>
            <div id="effects-container"></div>
        </div>

        <div class="biome-header">
            <p class="biome-name" id="biome-txt">Forest</p>
            <div id="weather-label" style="font-size: 12px; opacity: 0.7;">CLEAR SKIES</div>
        </div>
    </div>

    <div class="shop-overlay" id="shop">
        <div class="shop-card">
            <h1 style="color:#10b981">TEAM SHOP</h1>
            <p>High-Precision 3D Compass</p>
            <p style="font-size: 14px; opacity: 0.6; margin-bottom: 20px;">Cost: 10 Apples + 1 Gold Apple</p>
            <button id="buy-btn" class="shop-btn">PURCHASE FOR TEAM</button>
            <p style="margin-top:20px; font-size: 12px; opacity: 0.5;">Waiting for players to close...</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module" src="game.js"></script>
</body>
</html>
