<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SNAKE!</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #010409; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        
        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: white; }
        .stats-card { position: absolute; top: 20px; left: 20px; background: rgba(13, 17, 23, 0.85); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); }
        
        .biome-header { position: absolute; top: 20px; right: 20px; text-align: right; }
        .biome-name { font-size: 32px; font-weight: 900; color: #10b981; margin: 0; text-shadow: 0 0 20px rgba(16,185,129,0.4); }
        
        .weather-row { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-top: 5px; }
        .timer-wrap { width: 120px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        #timer-fill { height: 100%; width: 100%; background: #60a5fa; transition: width 1s linear; }

        .effects-list { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        .effect-tag { background: rgba(96, 165, 250, 0.2); padding: 5px 12px; border-radius: 5px; font-size: 12px; border-left: 3px solid #60a5fa; }

        .shop-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: none; place-items: center; pointer-events: all; z-index: 1000; backdrop-filter: blur(10px); }
        .shop-card { background: #161b22; padding: 40px; border-radius: 30px; border: 2px solid #10b981; text-align: center; }
        .shop-btn { padding: 15px 30px; background: #10b981; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .shop-btn:disabled { background: #334155; cursor: not-allowed; }

        .minimap-box { position: absolute; bottom: 20px; right: 20px; border: 4px solid rgba(255,255,255,0.1); border-radius: 15px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="stats-card">
            <div style="font-size: 26px;">🍎 <span id="s-norm">0</span> | <span style="color:#fbbf24">⭐ <span id="s-gold">0</span></span></div>
            <div class="effects-list" id="effects-container"></div>
            <div style="font-size: 10px; opacity: 0.4; margin-top: 10px;">[E] OPEN SHOP</div>
        </div>

        <div class="biome-header">
            <p class="biome-name" id="biome-txt">Forest</p>
            <div class="weather-row">
                <div style="text-align: right">
                    <div id="weather-label" style="font-size: 12px; opacity: 0.7;">CLEAR SKIES</div>
                    <div class="timer-wrap"><div id="timer-fill"></div></div>
                </div>
                <div id="w-icon" style="font-size: 45px;">☀️</div>
            </div>
        </div>

        <div class="minimap-box">
            <canvas id="minimap" width="180" height="180"></canvas>
        </div>
    </div>

    <div class="shop-overlay" id="shop">
        <div class="shop-card">
            <h1 style="color:#10b981">GLOBAL SHOP</h1>
            <p>High-Precision 3D Compass</p>
            <p style="font-size: 14px; opacity: 0.6; margin-bottom: 20px;">Required: 10 Apples + 1 Golden Apple</p>
            <button id="buy-btn" class="shop-btn">PURCHASE COMPASS</button>
            <p onclick="toggleShop()" style="margin-top:20px; cursor:pointer; opacity:0.5;">[ CLOSE ]</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module" src="game.js"></script>
</body>
</html>
